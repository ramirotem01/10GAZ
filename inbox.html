<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | הלהבות שלי 🔥</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff00ff;
            --secondary: #7000ff;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; padding: 20px; padding-bottom: 120px; overflow-x: hidden; }

        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 50px 50px; z-index: -2; opacity: 0.2; }
        .glow { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255, 0, 255, 0.07) 0%, transparent 70%); filter: blur(80px); z-index: -1; top: -100px; right: -100px; }

        .profile-header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 25px;
            padding: 25px; background: var(--glass); border-radius: 30px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .avatar {
            width: 70px; height: 70px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 800; color: #fff; transform: rotate(-5deg);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .user-info h2 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to left, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info p { color: var(--primary); font-size: 0.9rem; font-weight: 600; opacity: 0.8; }

        .title-glow { font-size: 2.2rem; font-weight: 900; text-align: center; margin: 10px 0 25px; text-shadow: 0 0 20px var(--primary); }

        .inbox-container { display: flex; flex-direction: column; gap: 18px; max-width: 500px; margin: 0 auto; }

        .flame-card {
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 30px;
            padding: 22px; display: flex; align-items: center; gap: 18px;
            backdrop-filter: blur(20px); animation: slideUp 0.6s ease forwards;
        }

        .flame-icon {
            width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; background: linear-gradient(135deg, rgba(255, 0, 255, 0.2), rgba(112, 0, 255, 0.2));
            border: 1px solid rgba(255, 0, 255, 0.3);
        }

        .flame-question { font-weight: 800; font-size: 1.2rem; margin-bottom: 6px; color: #fff; line-height: 1.3; }
        .flame-meta { font-size: 0.85rem; color: #94a3b8; font-weight: 600; }

        .empty-state { text-align: center; padding: 40px 20px; background: var(--glass); border-radius: 35px; border: 1px dashed var(--glass-border); margin-top: 10px; }
        .empty-state h3 { font-size: 1.3rem; margin-bottom: 12px; color: #fff; }
        .empty-state p { color: #94a3b8; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.4; }

        .btn-invite-whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: #fff; padding: 16px 28px; border-radius: 20px; text-decoration: none;
            font-weight: 800; display: inline-flex; align-items: center; gap: 10px; border: none; cursor: pointer;
        }

        .nav-bar {
            position: fixed; bottom: 25px; width: 90%; max-width: 420px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 20, 40, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08);
            padding: 18px; border-radius: 30px; display: flex; justify-content: space-around; z-index: 100;
        }
        .nav-item { color: #94a3b8; text-decoration: none; font-weight: 700; display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; gap: 6px; }
        .nav-item i { font-style: normal; font-size: 1.4rem; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 15px rgba(255, 0, 255, 0.5); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow"></div>

    <header class="profile-header">
        <div class="avatar" id="userInitial">--</div>
        <div class="user-info">
            <h2 id="userName">טוען...</h2>
            <p id="userSchoolTag">מתחבר לבי"ס...</p>
        </div>
    </header>

    <div class="title-glow">הלהבות שלי 🔥</div>

    <div class="inbox-container" id="inboxList">
        <p style="text-align: center; opacity: 0.5; padding: 40px;">מחפש להבות חדשות...</p>
    </div>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item"><i>🎮</i><span>סקרים</span></a>
        <a href="inbox.html" class="nav-item active"><i>🔥</i><span>להבות</span></a>
        <a href="squad.html" class="nav-item"><i>👥</i><span>נבחרת</span></a>
    </div>

<script type="module">
    // ייבוא של מה שקיים בוודאות ב-config שלך (בדיוק כמו ב-Squad)
    import { db, auth, onAuthStateChanged, collection, query, where, getDocs, doc, getDoc } from './firebase-config.js';

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        
        try {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) {
                const userData = userSnap.data();
                document.getElementById('userName').innerText = userData.name;
                document.getElementById('userInitial').innerText = userData.name.substring(0, 2);
                document.getElementById('userSchoolTag').innerText = `${userData.school} • שכבה ${userData.grade}`;
                
                loadInboxes(user.uid);
            }
        } catch (e) { console.error("Error:", e); }
    });

    async function loadInboxes(uid) {
        const inboxList = document.getElementById('inboxList');
        try {
            // שליפה בלי orderBy כדי למנוע את השגיאה
            const q = query(collection(db, "votes"), where("toId", "==", uid));
            const querySnapshot = await getDocs(q);
            
            // המרה למערך ומיון ידני (מכיוון שאין orderBy בייבוא)
            const votes = [];
            querySnapshot.forEach(doc => votes.push(doc.data()));
            
            // מיון מהחדש לישן לפי timestamp
            votes.sort((a, b) => {
                const timeA = a.timestamp?.seconds || 0;
                const timeB = b.timestamp?.seconds || 0;
                return timeB - timeA;
            });

            renderVotes(votes);
        } catch (e) {
            console.error("Load error:", e);
            inboxList.innerHTML = '<p style="text-align: center;">שגיאה בטעינת הנתונים.</p>';
        }
    }

    function renderVotes(votes) {
        const inboxList = document.getElementById('inboxList');
        inboxList.innerHTML = '';

        if (votes.length === 0) {
            inboxList.innerHTML = `
                <div class="empty-state">
                    <h3>עדיין אין להבות... 🔥</h3>
                    <p>כדי לקבל להבות, החברים מהבי"ס צריכים להצביע לך בסקרים!</p>
                    <button class="btn-invite-whatsapp" onclick="shareApp()">
                        שלח הזמנה לחברים 🚀
                    </button>
                </div>`;
            return;
        }

        votes.forEach((data) => {
            const timeStr = data.timestamp ? formatTime(data.timestamp.toDate()) : 'עכשיו';
            const card = document.createElement('div');
            card.className = 'flame-card';
            card.innerHTML = `
                <div class="flame-icon">🔥</div>
                <div class="flame-content">
                    <div class="flame-question">"${data.question}"</div>
                    <div class="flame-meta">${timeStr} • מישהו מהשכבה</div>
                </div>
            `;
            inboxList.appendChild(card);
        });
    }

    function formatTime(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        if (seconds < 60) return 'לפני רגע';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `לפני ${minutes} דק'`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `לפני ${hours} שע'`;
        return `לפני ${Math.floor(hours / 24)} ימים`;
    }

    window.shareApp = () => {
        const text = "בואו תראו מה אומרים עליכם ב-10GAZ! כנסו לראות מי הצביע לכם: https://ramirotem01.github.io/10GAZ/";
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    };
</script>
</body>
</html>
