<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | מצא את השכבה שלך</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #00b4d8;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Assistant', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* רקע תואם לדף הקודם */
        .glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease;
        }

        .step-indicator {
            color: var(--primary);
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
            font-size: 0.9rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
        }

        .registration-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeInUp 0.8s ease;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #cbd5e1;
            margin-right: 10px;
        }

        select, input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 20px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            appearance: none; /* מסיר את החץ המובנה של הדפדפן */
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        /* עיצוב חץ מותאם לסלקט */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .grade-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .grade-option {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 700;
        }

        .grade-option.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .btn-next {
            width: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-next:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-link {
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <header>
        <span class="step-indicator">שלב 2 מתוך 3</span>
        <h1>איפה אתם לומדים?</h1>
    </header>

    <main class="registration-card">
        <div class="input-group">
            <label>בחירת עיר</label>
            <div class="select-wrapper">
                <select>
                    <option value="">בחר עיר...</option>
                    <option value="tel-aviv">תל אביב - יפו</option>
                    <option value="jerusalem">ירושלים</option>
                    <option value="haifa">חיפה</option>
                    <option value="rishon">ראשון לציון</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>שם בית הספר</label>
            <input type="text" placeholder="התחל להקליד את שם בי הספר...">
        </div>

        <label>באיזו שכבה אתם?</label>
        <div class="grade-selector">
            <div class="grade-option" onclick="selectGrade(this)">ז'</div>
            <div class="grade-option" onclick="selectGrade(this)">ח'</div>
            <div class="grade-option" onclick="selectGrade(this)">ט'</div>
            <div class="grade-option" onclick="selectGrade(this)">י'</div>
            <div class="grade-option" onclick="selectGrade(this)">י"א</div>
            <div class="grade-option" onclick="selectGrade(this)">י"ב</div>
        </div>

        <button class="btn-next" onclick="window.location.href='#'">
            ממשיכים לפרגונים 
            <span>←</span>
        </button>
    </main>

    <a href="#" class="back-link">חזרה לדף הקודם</a>

    <script>
        function selectGrade(element) {
            // הסרת מחלקת active מכל האפשרויות
            document.querySelectorAll('.grade-option').forEach(opt => {
                opt.classList.remove('active');
            });
            // הוספה לאלמנט שנבחר
            element.classList.add('active');
        }
    </script>

</body>
</html>
