<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | הנבחרת שלי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --secondary: #00b4d8; --bg-dark: #050a14; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; padding: 20px; padding-bottom: 120px; overflow-x: hidden; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 50px 50px; z-index: -2; opacity: 0.2; }
        .glow { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 255, 204, 0.07) 0%, transparent 70%); filter: blur(80px); z-index: -1; top: -100px; right: -100px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; padding: 25px; background: var(--glass); border-radius: 30px; border: 1px solid var(--glass-border); backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .avatar { width: 70px; height: 70px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 800; color: #050a14; transform: rotate(-5deg); box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        .user-info h2 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to left, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info p { color: var(--primary); font-size: 0.9rem; font-weight: 600; opacity: 0.8; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--glass); padding: 20px; border-radius: 25px; text-align: center; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        .stat-card span { display: block; font-size: 2.2rem; font-weight: 800; color: #fff; text-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }
        .stat-card label { font-size: 0.75rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .invite-section { background: var(--glass); border: 1px solid var(--glass-border); padding: 30px; border-radius: 35px; text-align: center; margin-bottom: 30px; }
        .btn-invite-whatsapp { background: linear-gradient(135deg, rgba(37, 211, 102, 0.2), rgba(37, 211, 102, 0.05)); border: 1px solid rgba(37, 211, 102, 0.4); color: #fff; padding: 18px 30px; border-radius: 20px; text-decoration: none; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; margin: 0 auto; width: fit-content; }
        .squad-list { background: var(--glass); border-radius: 35px; padding: 25px; border: 1px solid var(--glass-border); }
        .squad-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .friend-info { display: flex; align-items: center; gap: 15px; }
        .friend-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); }
        .nav-bar { position: fixed; bottom: 25px; width: 90%; max-width: 420px; left: 50%; transform: translateX(-50%); background: rgba(10, 20, 40, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); padding: 18px; border-radius: 30px; display: flex; justify-content: space-around; }
        .nav-item { color: #94a3b8; text-decoration: none; font-weight: 700; display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; gap: 6px; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow"></div>

    <header class="profile-header">
        <div class="avatar" id="userInitial">--</div>
        <div class="user-info">
            <h2 id="userName">טוען...</h2>
            <p id="userSchoolTag">מתחבר לבי"ס...</p>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span id="flamesReceived">0</span>
            <label>להבות שקיבלת</label>
        </div>
        <div class="stat-card">
            <span id="votesSent">0</span>
            <label>פרגונים ששלחת</label>
        </div>
    </div>

    <section class="invite-section">
        <h3>הוסף עוד חברים! 🚀</h3>
        <p>ככל שיש יותר חברים מהבי"ס, ככה תקבלו יותר פרגונים ביום!</p>
        <button class="btn-invite-whatsapp" onclick="shareApp()">הזמן לקבוצה</button>
    </section>

    <main class="squad-list">
        <h4>חברים מהבי"ס שלך ב-10GAZ</h4>
        <div id="squadContainer">
            <p style="text-align: center; opacity: 0.5;">מחפש חברים...</p>
        </div>
    </main>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item"><i>🎮</i><span>סקרים</span></a>
        <a href="inbox.html" class="nav-item"><i>🔥</i><span>להבות</span></a>
        <a href="squad.html" class="nav-item active"><i>👥</i><span>נבחרת</span></a>
    </div>

<script type="module">
    import { db, auth, onAuthStateChanged, collection, query, where, getDocs, doc, getDoc } from './firebase-config.js';

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        
        try {
            let currentUserData = null;
            let currentUserId = user.uid;

            // בדיקה האם המשתמש קיים לפי UID
            const userSnap = await getDoc(doc(db, "users", user.uid));
            const savedShortId = localStorage.getItem('user_short_id');

            if (!userSnap.exists() && savedShortId) {
                // חיפוש לפי ShortID אם ה-UID לא נמצא (למקרה של כניסה עם קוד)
                const q = query(collection(db, "users"), where("shortId", "==", savedShortId));
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) {
                    const foundDoc = querySnapshot.docs[0];
                    currentUserData = foundDoc.data();
                    currentUserId = foundDoc.id; // משתמשים ב-Document ID המקורי
                }
            } else if (userSnap.exists()) {
                currentUserData = userSnap.data();
            }

            if (currentUserData) {
                // עדכון ממשק
                document.getElementById('userName').innerText = currentUserData.name;
                document.getElementById('userInitial').innerText = currentUserData.name.substring(0, 2);
                document.getElementById('userSchoolTag').innerText = `${currentUserData.school} • שכבה ${currentUserData.grade}`;
                
                // טעינת סטטיסטיקות לפי ה-ID הנכון
                const sentSnap = await getDocs(query(collection(db, "votes"), where("fromId", "==", currentUserId)));
                document.getElementById('votesSent').innerText = sentSnap.size;
                
                const receivedSnap = await getDocs(query(collection(db, "votes"), where("toId", "==", currentUserId)));
                document.getElementById('flamesReceived').innerText = receivedSnap.size;
                
                loadSquad(currentUserData.school, currentUserId);
            } else {
                window.location.href = 'register.html';
            }
        } catch (e) { 
            console.error("Squad Load Error:", e); 
        }
    });

    async function loadSquad(school, myId) {
        const squadContainer = document.getElementById('squadContainer');
        try {
            const q = query(collection(db, "users"), where("school", "==", school));
            const querySnapshot = await getDocs(q);
            squadContainer.innerHTML = '';
            
            let count = 0;
            querySnapshot.forEach((docSnap) => {
                if (docSnap.id === myId) return;
                count++;
                const friend = docSnap.data();
                const item = document.createElement('div');
                item.className = 'squad-item';
                item.innerHTML = `
                    <div class="friend-info">
                        <div class="friend-dot"></div>
                        <span class="friend-name">${friend.name}</span>
                    </div>
                    <span style="color: #64748b; font-size: 0.85rem; font-weight: 600;">שכבה ${friend.grade}</span>
                `;
                squadContainer.appendChild(item);
            });

            if (count === 0) {
                squadContainer.innerHTML = '<p style="text-align: center; opacity: 0.5; padding: 20px;">אתה הראשון מהבי"ס! <br> תזמין חברים כדי להתחיל לשחק.</p>';
            }
        } catch (e) { 
            squadContainer.innerHTML = '<p>שגיאה בטעינת הרשימה.</p>'; 
        }
    }

    window.shareApp = () => {
        const text = "בואו תראו מה אומרים עליכם ב-10GAZ! כנסו לנבחרת שלי: https://ramirotem01.github.io/10GAZ/";
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    };
</script>
</body>
</html>
