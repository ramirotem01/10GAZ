<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | הנבחרת שלי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #00b4d8;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; padding: 20px; padding-bottom: 120px; overflow-x: hidden; }

        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 50px 50px; z-index: -2; opacity: 0.2; }
        .glow { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0, 255, 204, 0.07) 0%, transparent 70%); filter: blur(80px); z-index: -1; top: -100px; right: -100px; }

        .profile-header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 15px;
            padding: 25px; background: var(--glass); border-radius: 30px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .avatar {
            width: 70px; height: 70px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 800; color: #050a14; transform: rotate(-5deg);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        .user-info h2 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to left, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info p { color: var(--primary); font-size: 0.9rem; font-weight: 600; opacity: 0.8; }

        /* קוד התחברות */
        .auth-code-card {
            background: rgba(0, 255, 204, 0.05); border: 1px dashed var(--primary);
            padding: 12px; border-radius: 20px; margin-bottom: 20px; text-align: center;
        }
        .auth-code-card label { display: block; font-size: 0.75rem; color: var(--primary); font-weight: 700; margin-bottom: 5px; }
        .code-display { font-family: monospace; font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; color: #fff; cursor: pointer; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--glass); padding: 20px; border-radius: 25px; text-align: center; 
            border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
        }
        .stat-card span { display: block; font-size: 2.2rem; font-weight: 800; color: #fff; }
        .stat-card label { font-size: 0.75rem; color: #94a3b8; font-weight: 700; }

        .invite-section {
            background: var(--glass); border: 1px solid var(--glass-border); padding: 25px; border-radius: 35px; 
            text-align: center; margin-bottom: 30px;
        }
        .btn-invite-whatsapp {
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.2), rgba(37, 211, 102, 0.05));
            border: 1px solid rgba(37, 211, 102, 0.4); color: #fff; padding: 15px 25px; border-radius: 20px;
            text-decoration: none; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .squad-list { background: var(--glass); border-radius: 35px; padding: 25px; border: 1px solid var(--glass-border); }
        .squad-list h4 { margin-bottom: 20px; color: #94a3b8; font-size: 0.9rem; font-weight: 700; }
        
        .squad-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .friend-info { display: flex; align-items: center; gap: 12px; }
        .friend-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 8px var(--primary); }
        .friend-name { font-weight: 700; font-size: 1rem; }
        
        .friend-stats { text-align: left; display: flex; flex-direction: column; align-items: flex-end; }
        .vote-count { color: var(--primary); font-weight: 800; font-size: 0.9rem; }
        .grade-tag { color: #64748b; font-size: 0.75rem; }

        .nav-bar {
            position: fixed; bottom: 25px; width: 90%; max-width: 420px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 20, 40, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08);
            padding: 18px; border-radius: 30px; display: flex; justify-content: space-around; z-index: 100;
        }
        .nav-item { color: #94a3b8; text-decoration: none; font-weight: 700; display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; gap: 6px; }
        .nav-item i { font-style: normal; font-size: 1.4rem; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow"></div>

    <header class="profile-header">
        <div class="avatar" id="userInitial">--</div>
        <div class="user-info">
            <h2 id="userName">טוען...</h2>
            <p id="userSchoolTag">מתחבר...</p>
        </div>
    </header>

    <div class="auth-code-card" id="codeCard" style="display: none;">
        <label>קוד ההתחברות שלך (לשמירה):</label>
        <div class="code-display" id="myAuthCode" onclick="copyCode()">----</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span id="flamesReceived">0</span>
            <label>להבות שקיבלת</label>
        </div>
        <div class="stat-card">
            <span id="votesSent">0</span>
            <label>פרגונים ששלחת</label>
        </div>
    </div>

    <section class="invite-section">
        <button class="btn-invite-whatsapp" onclick="shareApp()">הזמן חברים מהכיתה 🚀</button>
    </section>

    <main class="squad-list">
        <h4>חברים מהבי"ס ב-10GAZ</h4>
        <div id="squadContainer">
            <p style="text-align: center; opacity: 0.5;">מחפש חברים...</p>
        </div>
    </main>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item"><i>🎮</i><span>סקרים</span></a>
        <a href="inbox.html" class="nav-item"><i>🔥</i><span>להבות</span></a>
        <a href="squad.html" class="nav-item active"><i>👥</i><span>נבחרת</span></a>
    </div>

<script type="module">
    import { db, auth, onAuthStateChanged, collection, query, where, getDocs, doc, getDoc } from './firebase-config.js';

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        try {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) {
                const userData = userSnap.data();
                document.getElementById('userName').innerText = userData.name;
                document.getElementById('userInitial').innerText = userData.name.substring(0, 2);
                document.getElementById('userSchoolTag').innerText = `${userData.school} • שכבה ${userData.grade}`;
                
                // הצגת קוד התחברות (Short ID)
                if(userData.shortId) {
                    document.getElementById('codeCard').style.display = 'block';
                    document.getElementById('myAuthCode').innerText = userData.shortId;
                }

                const sentSnap = await getDocs(query(collection(db, "votes"), where("fromId", "==", user.uid)));
                document.getElementById('votesSent').innerText = sentSnap.size;
                
                const receivedSnap = await getDocs(query(collection(db, "votes"), where("toId", "==", user.uid)));
                document.getElementById('flamesReceived').innerText = receivedSnap.size;
                
                loadSquad(userData.school, user.uid);
            }
        } catch (e) { console.error(e); }
    });

    async function loadSquad(school, myUid) {
        const squadContainer = document.getElementById('squadContainer');
        try {
            const q = query(collection(db, "users"), where("school", "==", school));
            const querySnapshot = await getDocs(q);
            squadContainer.innerHTML = '';
            
            if (querySnapshot.size <= 1) {
                squadContainer.innerHTML = '<p style="text-align: center; opacity: 0.5; padding: 20px;">מחכים לחברים הראשונים...</p>';
                return;
            }

            // יצירת רשימה עם הבאת כמות פירגונים לכל אחד
            for (const docSnap of querySnapshot.docs) {
                if (docSnap.id === myUid) continue;
                const friend = docSnap.data();
                
                // שאילתה לספירת פירגונים שקיבל החבר
                const friendVotesSnap = await getDocs(query(collection(db, "votes"), where("toId", "==", docSnap.id)));
                const voteCount = friendVotesSnap.size;

                const item = document.createElement('div');
                item.className = 'squad-item';
                item.innerHTML = `
                    <div class="friend-info">
                        <div class="friend-dot"></div>
                        <span class="friend-name">${friend.name}</span>
                    </div>
                    <div class="friend-stats">
                        <span class="vote-count">🔥 ${voteCount}</span>
                        <span class="grade-tag">שכבה ${friend.grade}</span>
                    </div>
                `;
                squadContainer.appendChild(item);
            }
        } catch (e) { 
            console.error(e);
            squadContainer.innerHTML = '<p>שגיאה בטעינה.</p>'; 
        }
    }

    window.copyCode = () => {
        const code = document.getElementById('myAuthCode').innerText;
        navigator.clipboard.writeText(code);
        alert("הקוד הועתק! שמור אותו במקום בטוח.");
    };

    window.shareApp = () => {
        const text = "בואו תראו מה אומרים עליכם ב-10GAZ! כולם כבר שם: https://ramirotem01.github.io/10GAZ/";
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    };
</script>
</body>
</html>
