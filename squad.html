<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | הנבחרת שלי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #00b4d8;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; padding: 20px; padding-bottom: 100px; }

        .profile-header {
            display: flex; align-items: center; gap: 15px; margin-bottom: 30px;
            padding: 20px; background: var(--glass); border-radius: 25px; border: 1px solid var(--glass-border);
        }

        .avatar {
            width: 60px; height: 60px; background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 800; color: #000;
        }

        .user-info h2 { font-size: 1.4rem; }
        .user-info p { color: #64748b; font-size: 0.9rem; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--glass); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--glass-border); }
        .stat-card span { display: block; font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-card label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; }

        .invite-section {
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.1) 0%, rgba(112, 0, 255, 0.1) 100%);
            border: 1px solid var(--primary); padding: 30px; border-radius: 30px; text-align: center; margin-bottom: 30px;
        }

        .btn-invite {
            background: var(--primary); color: #000; width: 100%; padding: 15px;
            border-radius: 15px; font-weight: 800; border: none; cursor: pointer; font-size: 1.1rem;
        }

        .squad-list { background: var(--glass); border-radius: 25px; padding: 20px; border: 1px solid var(--glass-border); }
        .squad-list h4 { margin-bottom: 15px; color: #94a3b8; font-size: 0.9rem; }
        .squad-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .friend-info { display: flex; align-items: center; gap: 10px; }
        .friend-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; }

        .nav-bar {
            position: fixed; bottom: 20px; width: 90%; max-width: 400px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 20, 40, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 30px; display: flex; justify-content: space-around; z-index: 100;
        }
        .nav-item { color: #64748b; text-decoration: none; font-weight: 800; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header class="profile-header">
        <div class="avatar" id="userInitial">--</div>
        <div class="user-info">
            <h2 id="userName">טוען...</h2>
            <p id="userSchoolTag">מתחבר לבי"ס...</p>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span id="flamesReceived">0</span>
            <label>להבות שקיבלת</label>
        </div>
        <div class="stat-card">
            <span id="votesSent">0</span>
            <label>פרגונים ששלחת</label>
        </div>
    </div>

    <section class="invite-section">
        <h3>הוסף עוד חברים! 🚀</h3>
        <p>ככל שיש יותר חברים מהבי"ס, ככה תקבלו יותר פרגונים!</p>
        <button class="btn-invite" onclick="shareApp()">שלח הזמנה לוואטסאפ</button>
    </section>

    <main class="squad-list">
        <h4>חברים מהבי"ס שלך ב-10GAZ</h4>
        <div id="squadContainer">
            <p style="text-align: center; opacity: 0.5;">מחפש חברים...</p>
        </div>
    </main>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item"><span>🎮</span>סקרים</a>
        <a href="inbox.html" class="nav-item"><span>🔥</span>להבות</a>
        <a href="squad.html" class="nav-item active"><span>👥</span>נבחרת</a>
    </div>

<script type="module">
    import { db, auth, onAuthStateChanged, collection, query, where, getDocs, doc, getDoc } from './firebase-config.js';

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        try {
            // 1. שליפת פרטי המשתמש שלי
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) {
                const userData = userSnap.data();
                document.getElementById('userName').innerText = userData.name;
                document.getElementById('userInitial').innerText = userData.name.substring(0, 2);
                document.getElementById('userSchoolTag').innerText = `${userData.school} • שכבה ${userData.grade}`;
                
                // 2. סטטיסטיקות: פרגונים ששלחתי
                const sentQuery = query(collection(db, "votes"), where("fromId", "==", user.uid));
                const sentSnap = await getDocs(sentQuery);
                document.getElementById('votesSent').innerText = sentSnap.size;

                // 3. סטטיסטיקות: להבות שקיבלתי
                const receivedQuery = query(collection(db, "votes"), where("toId", "==", user.uid));
                const receivedSnap = await getDocs(receivedQuery);
                document.getElementById('flamesReceived').innerText = receivedSnap.size;

                // 4. טעינת רשימת הנבחרת (חברים מהבי"ס)
                loadSquad(userData.school, user.uid);
            }
        } catch (e) {
            console.error("Error loading squad data:", e);
        }
    });

    async function loadSquad(school, myUid) {
        const squadContainer = document.getElementById('squadContainer');
        try {
            const q = query(collection(db, "users"), where("school", "==", school));
            const querySnapshot = await getDocs(q);
            
            squadContainer.innerHTML = '';
            
            if (querySnapshot.size <= 1) {
                squadContainer.innerHTML = '<p style="text-align: center; opacity: 0.5;">אתה הראשון מהבי"ס! תזמין חברים.</p>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                if (docSnap.id === myUid) return; // לא להציג את עצמי ברשימה
                
                const friend = docSnap.data();
                const item = document.createElement('div');
                item.className = 'squad-item';
                item.innerHTML = `
                    <div class="friend-info">
                        <div class="friend-dot"></div>
                        <span>${friend.name}</span>
                    </div>
                    <span style="color: #64748b; font-size: 0.8rem;">שכבה ${friend.grade}</span>
                `;
                squadContainer.appendChild(item);
            });
        } catch (e) {
            squadContainer.innerHTML = '<p>שגיאה בטעינת החברים.</p>';
        }
    }

    window.shareApp = () => {
        const text = "בואו תראו מה אומרים עליכם ב-10GAZ! כנסו לנבחרת שלי: " + window.location.origin;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    };
</script>
</body>
</html>
