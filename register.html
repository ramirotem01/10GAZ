<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | מצא את השכבה שלך</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #00b4d8;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Assistant', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .step-indicator {
            color: var(--primary);
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
            font-size: 0.9rem;
        }

        h1 { font-size: 2.2rem; font-weight: 800; }

        .registration-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-group { margin-bottom: 25px; }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #cbd5e1;
            margin-right: 10px;
        }

        select, input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 20px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            appearance: none;
            transition: 0.3s;
        }

        /* תיקון צבעים לרשימת הבחירה - שחור על לבן */
        select option {
            background-color: white;
            color: black;
        }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▼';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .grade-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .grade-option {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 700;
        }

        .grade-option.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .btn-next {
            width: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-next:disabled { opacity: 0.6; cursor: not-allowed; }

        .back-link {
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <header>
        <span class="step-indicator">שלב 2 מתוך 3</span>
        <h1>איפה אתם לומדים?</h1>
    </header>

    <main class="registration-card">
        <div class="input-group">
            <label>בחירת עיר</label>
            <div class="select-wrapper">
                <select id="citySelect">
                    <option value="" disabled selected>בחר עיר...</option>
                    <option value="תל אביב">תל אביב - יפו</option>
                    <option value="ירושלים">ירושלים</option>
                    <option value="חיפה">חיפה</option>
                    <option value="ראשון לציון">ראשון לציון</option>
                    <option value="פתח תקווה">פתח תקווה</option>
                    <option value="אשדוד">אשדוד</option>
                    <option value="נתניה">נתניה</option>
                    <option value="באר שבע">באר שבע</option>
                    <option value="חולון">חולון</option>
                    <option value="רמת גן">רמת גן</option>
                    <option value="הרצליה">הרצליה</option>
                    <option value="כפר סבא">כפר סבא</option>
                    <option value="רעננה">רעננה</option>
                    <option value="מודיעין">מודיעין-מכבים-רעות</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>שם בית הספר</label>
            <input type="text" id="schoolInput" placeholder="לדוגמה: שבח מופת, הגימנסיה...">
        </div>

        <label>באיזו שכבה אתם?</label>
        <div class="grade-selector" id="gradeSelector">
            <div class="grade-option">ז'</div>
            <div class="grade-option">ח'</div>
            <div class="grade-option">ט'</div>
            <div class="grade-option">י'</div>
            <div class="grade-option">י"א</div>
            <div class="grade-option">י"ב</div>
        </div>

        <button class="btn-next" id="submitBtn">
            ממשיכים לפרגונים 
            <span>←</span>
        </button>
    </main>

    <a href="index.html" class="back-link">חזרה לדף הקודם</a>

    <script type="module">
        import { db, auth, setDoc, doc, signInAnonymously, serverTimestamp } from './firebase-config.js';

        // ניהול בחירת שכבה
        const gradeOptions = document.querySelectorAll('.grade-option');
        gradeOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                gradeOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            });
        });

        // פונקציית הרישום
        async function handleRegister() {
            const name = localStorage.getItem('temp_name') || "אנונימי";
            const city = document.getElementById('citySelect').value;
            const school = document.getElementById('schoolInput').value.trim();
            const activeGrade = document.querySelector('.grade-option.active');
            const grade = activeGrade ? activeGrade.innerText : null;

            if(!city || !school || !grade) {
                alert("מלא את כל הפרטים כדי להיכנס לרדאר!");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "מתחבר...";

            try {
                // כניסה אנונימית
                const userCred = await signInAnonymously(auth);
                const uid = userCred.user.uid;

                // שמירה ב-Firestore
                await setDoc(doc(db, "users", uid), {
                    name: name,
                    city: city,
                    school: school,
                    grade: grade,
                    diamonds: 10,
                    createdAt: serverTimestamp()
                });

                window.location.href = 'polls.html'; 
            } catch (e) {
                console.error("Error:", e);
                // אם עדיין יש שגיאת Billing - כאן היא תופיע ב-Console
                alert("שגיאה ברישום. בדוק את הגדרות ה-Firebase שלך.");
                btn.disabled = false;
                btn.innerText = "ממשיכים לפרגונים ←";
            }
        }

        document.getElementById('submitBtn').onclick = handleRegister;
    </script>
</body>
</html>
