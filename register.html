<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | מצא את השכבה שלך</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #00b4d8;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* סגנונות כלליים */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden; }
        
        .glow { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 255, 204, 0.1) 0%, transparent 70%); filter: blur(80px); z-index: -1; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        header { text-align: center; margin-top: 40px; margin-bottom: 30px; }
        .step-indicator { color: var(--primary); font-weight: 800; letter-spacing: 2px; font-size: 0.9rem; text-transform: uppercase; }
        h1 { font-size: 2.2rem; font-weight: 800; margin-top: 5px; }

        .registration-card { background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); padding: 30px; border-radius: 35px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .input-group { margin-bottom: 25px; position: relative; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #cbd5e1; margin-right: 10px; }

        select, input {
            width: 100%; background: rgba(255,255,255,0.07); border: 1px solid var(--glass-border);
            padding: 18px; border-radius: 20px; color: white; font-size: 1.1rem; outline: none; transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        select option { background-color: #0f172a; color: white; }

        /* Loader פשוט לשדות */
        .loading-spinner {
            position: absolute; left: 15px; top: 50px; width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .grade-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .grade-option {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 15px; text-align: center; cursor: pointer;
            transition: 0.3s; font-weight: 700; font-size: 1.1rem;
        }
        .grade-option:hover { background: rgba(255,255,255,0.1); }
        .grade-option.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }

        .btn-next {
            width: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #000; border: none; padding: 20px; border-radius: 20px;
            font-size: 1.3rem; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: transform 0.2s;
        }
        .btn-next:active { transform: scale(0.98); }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        .back-link { margin-top: 20px; color: #64748b; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="glow"></div>

    <header>
        <span class="step-indicator">שלב 2 מתוך 3</span>
        <h1>איפה אתם לומדים?</h1>
    </header>

    <main class="registration-card">
        <div class="input-group">
            <label>בחירת עיר</label>
            <select id="citySelect">
                <option value="" disabled selected>טוען ערים...</option>
            </select>
            <div id="cityLoader" class="loading-spinner" style="display: block;"></div>
        </div>

        <div class="input-group">
            <label>שם בית הספר</label>
            <input type="text" id="schoolInput" list="schoolList" placeholder="בחר קודם עיר..." disabled>
            <datalist id="schoolList"></datalist>
            <div id="schoolLoader" class="loading-spinner"></div>
        </div>

        <label>באיזו שכבה אתם?</label>
        <div class="grade-selector" id="gradeSelector">
            <div class="grade-option">ז'</div>
            <div class="grade-option">ח'</div>
            <div class="grade-option">ט'</div>
            <div class="grade-option">י'</div>
            <div class="grade-option">י"א</div>
            <div class="grade-option">י"ב</div>
        </div>

        <button class="btn-next" id="submitBtn">
            ממשיכים לפרגונים 
            <span>←</span>
        </button>
    </main>

    <a href="index.html" class="back-link">חזרה לדף הקודם</a>

    <script type="module">
        import { db, auth, setDoc, doc, getDoc, signInAnonymously, serverTimestamp, onAuthStateChanged } from './firebase-config.js';

        const citySelect = document.getElementById('citySelect');
        const schoolInput = document.getElementById('schoolInput');
        const schoolList = document.getElementById('schoolList');
        const submitBtn = document.getElementById('submitBtn');
        const cityLoader = document.getElementById('cityLoader');
        const schoolLoader = document.getElementById('schoolLoader');

        const RESOURCE_ID = '9ad3fa73-0498-4c91-884b-093202167d58';

        // 1. משיכת רשימת ערים ייחודיות מה-API
        async function loadCities() {
            try {
                const url = `https://data.gov.il/api/3/action/datastore_search?resource_id=${RESOURCE_ID}&fields=SETL_NAME&limit=5000`;
                const response = await fetch(url);
                const resData = await response.json();
                
                const cities = [...new Set(resData.result.records.map(r => r.SETL_NAME))].sort();
                
                citySelect.innerHTML = '<option value="" disabled selected>בחר עיר...</option>';
                cities.forEach(city => {
                    const opt = document.createElement('option');
                    opt.value = city;
                    opt.innerText = city;
                    citySelect.appendChild(opt);
                });
            } catch (e) {
                console.error("Error loading cities", e);
                citySelect.innerHTML = '<option value="" disabled>שגיאה בטעינה</option>';
            } finally {
                cityLoader.style.display = 'none';
            }
        }

        // 2. משיכת בתי ספר לפי העיר שנבחרה
        citySelect.addEventListener('change', async () => {
            const selectedCity = citySelect.value;
            schoolInput.value = '';
            schoolInput.disabled = true;
            schoolInput.placeholder = "טוען בתי ספר...";
            schoolLoader.style.display = 'block';
            schoolList.innerHTML = '';

            try {
                // שאילתת SQL בתוך ה-API לסינון לפי עיר
                const url = `https://data.gov.il/api/3/action/datastore_search_sql?sql=SELECT "INSTITUTION_NAME" FROM "${RESOURCE_ID}" WHERE "SETL_NAME" = '${selectedCity}'`;
                const response = await fetch(url);
                const resData = await response.json();
                
                const schools = resData.result.records.map(r => r.INSTITUTION_NAME);
                
                schools.forEach(school => {
                    const opt = document.createElement('option');
                    opt.value = school;
                    schoolList.appendChild(opt);
                });

                schoolInput.disabled = false;
                schoolInput.placeholder = "הקלד או בחר בית ספר...";
            } catch (e) {
                console.error("Error loading schools", e);
            } finally {
                schoolLoader.style.display = 'none';
            }
        });

        // 3. בחירת שכבה (ללא שינוי)
        const gradeOptions = document.querySelectorAll('.grade-option');
        gradeOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                gradeOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            });
        });

        // 4. רישום ל-Firebase
        async function handleRegister() {
            const name = localStorage.getItem('temp_name') || "אנונימי";
            const city = citySelect.value;
            const school = schoolInput.value.trim();
            const activeGrade = document.querySelector('.grade-option.active');
            const grade = activeGrade ? activeGrade.innerText : null;

            if(!city || !school || !grade) {
                alert("אנא מלאו את כל הפרטים כדי להמשיך!");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "מתחברים...";

            try {
                let user = auth.currentUser;
                if (!user) {
                    const userCred = await signInAnonymously(auth);
                    user = userCred.user;
                }

                await setDoc(doc(db, "users", user.uid), {
                    name, city, school, grade,
                    diamonds: 10,
                    createdAt: serverTimestamp()
                });

                localStorage.removeItem('temp_name');
                window.location.href = 'polls.html'; 
            } catch (e) {
                console.error(e);
                alert("משהו השתבש: " + e.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "נסה שוב ←";
            }
        }

        submitBtn.addEventListener('click', handleRegister);

        // אתחול
        loadCities();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) window.location.href = 'polls.html';
            }
        });
    </script>
</body>
</html>
