<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | הצטרפות</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Assistant', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        h2 { margin-bottom: 20px; font-weight: 800; }
        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1rem;
        }
        .btn-finish {
            background: var(--primary);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .loading-overlay {
            display: none;
            margin-top: 15px;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="welcomeTitle">היי! כמעט סיימנו</h2>
        <p style="margin-bottom: 20px; opacity: 0.8;">מאיזה בית ספר אתה?</p>
        
        <input type="text" id="schoolInput" placeholder="שם בית הספר (למשל: בליך)" required>
        
        <select id="gradeSelect">
            <option value="" disabled selected>באיזו שכבה אתה?</option>
            <option value="ט">שכבה ט'</option>
            <option value="י">שכבה י'</option>
            <option value="יא">שכבה י"א</option>
            <option value="יב">שכבה י"ב</option>
        </select>

        <button onclick="completeRegistration()" class="btn-finish" id="finishBtn">יאללה, תכניסו אותי!</button>
        <div id="loadingMsg" class="loading-overlay">רושם אותך למערכת... 🚀</div>
    </div>

    <script type="module">
        import { auth, db, signInAnonymously, doc, setDoc } from './firebase-config.js';

        // משיכת השם שנשמר בדף הקודם
        const tempName = localStorage.getItem('temp_name');
        if (!tempName) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('welcomeTitle').innerText = `היי ${tempName}, כמעט סיימנו!`;
        }

        window.completeRegistration = async function() {
            const school = document.getElementById('schoolInput').value.trim();
            const grade = document.getElementById('gradeSelect').value;
            const btn = document.getElementById('finishBtn');
            const loading = document.getElementById('loadingMsg');

            if (!school || !grade) {
                alert("בבקשה מלא את כל הפרטים");
                return;
            }

            try {
                btn.style.display = 'none';
                loading.style.display = 'block';

                // 1. התחברות אנונימית ל-Firebase
                const userCredential = await signInAnonymously(auth);
                const user = userCredential.user;

                // 2. יצירת מסמך המשתמש ב-Firestore
                // משתמשים ב-setDoc עם ה-UID של המשתמש כדי שזה יהיה המפתח
                await setDoc(doc(db, "users", user.uid), {
                    name: tempName,
                    school: school,
                    grade: grade,
                    diamonds: 0,
                    createdAt: new Date()
                });

                console.log("Registration successful!");
                
                // 3. ניקוי השם הזמני ומעבר לדף הסקרים
                localStorage.removeItem('temp_name');
                window.location.href = 'polls.html';

            } catch (error) {
                console.error("Error during registration:", error);
                alert("שגיאה ברישום: " + error.message);
                btn.style.display = 'block';
                loading.style.display = 'none';
            }
        };
    </script>
</body>
</html>
