<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | רישום</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --secondary: #00b4d8; --bg-dark: #050a14; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden; }
        .glow { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 255, 204, 0.1) 0%, transparent 70%); filter: blur(80px); z-index: -1; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        header { text-align: center; margin: 40px 0 30px; }
        h1 { font-size: 2.2rem; font-weight: 800; }
        .registration-card, .success-card { background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); padding: 30px; border-radius: 35px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: block; }
        .success-card { display: none; text-align: center; border: 2px solid var(--primary); }
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #cbd5e1; }
        
        /* עיצוב שדות הקלט */
        input, select { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 18px; border-radius: 20px; color: white; font-size: 1.1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.15); }
        input::placeholder { color: rgba(255,255,255,0.3); }

        .grade-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .grade-option { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: 700; }
        .grade-option.active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
        .btn-main { width: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; border: none; padding: 20px; border-radius: 20px; font-size: 1.3rem; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-main:disabled { opacity: 0.5; }
        .recovery-code { font-size: 3rem; font-weight: 900; color: var(--primary); letter-spacing: 5px; margin: 20px 0; text-shadow: 0 0 20px rgba(0,255,204,0.4); }
        .info-text { color: #94a3b8; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.4; }
        .optional-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-top: 20px; border: 1px dashed var(--glass-border); }
    </style>
</head>
<body>

    <div class="glow"></div>

    <header id="regHeader">
        <h1>איפה אתם לומדים?</h1>
    </header>

    <main class="registration-card" id="regCard">
        <div class="input-group">
            <label>בחירת עיר</label>
            <input type="text" id="cityInput" list="citiesList" placeholder="הקלד שם עיר...">
            <datalist id="citiesList"></datalist>
        </div>

        <div class="input-group">
            <label>שם בית הספר</label>
            <input type="text" id="schoolInput" list="schoolsList" placeholder="הקלד שם בית ספר..." disabled>
            <datalist id="schoolsList"></datalist>
        </div>

        <label>באיזו שכבה אתם?</label>
        <div class="grade-selector">
            <div class="grade-option">ז'</div><div class="grade-option">ח'</div><div class="grade-option">ט'</div>
            <div class="grade-option">י'</div><div class="grade-option">י"א</div><div class="grade-option">י"ב</div>
        </div>

        <button class="btn-main" id="submitBtn">צור חשבון ←</button>
    </main>

    <main class="success-card" id="successCard">
        <h2 style="color: var(--primary)">החשבון נוצר!</h2>
        <p class="info-text" style="margin-top:10px">זהו קוד הכניסה האישי שלך.<br>מומלץ מאוד <b>לצלם מסך</b> עכשיו.</p>
        
        <div class="recovery-code" id="displayCode">-----</div>

        <div class="optional-box">
            <p class="info-text"><b>בונוס (אופציונלי):</b> שכחת את הקוד? נשלח לך אותו למייל.</p>
            <input type="email" id="recoveryEmail" placeholder="הכנס אימייל לשחזור..." style="margin-bottom: 15px;">
            <button id="saveEmailBtn" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:10px 20px; border-radius:15px; cursor:pointer; font-weight:700;">שמור אימייל וסיים</button>
        </div>

        <button class="btn-main" id="finishBtn" style="margin-top: 25px;">אל הסקרים! 🚀</button>
    </main>

    <script type="module">
        import { db, auth, setDoc, doc, updateDoc, signInAnonymously, serverTimestamp } from './firebase-config.js';
        import { schoolData } from './schools-data.js';

        const cityInput = document.getElementById('cityInput');
        const schoolInput = document.getElementById('schoolInput');
        const citiesList = document.getElementById('citiesList');
        const schoolsList = document.getElementById('schoolsList');
        const submitBtn = document.getElementById('submitBtn');
        const regCard = document.getElementById('regCard');
        const successCard = document.getElementById('successCard');
        const displayCode = document.getElementById('displayCode');
        let currentUserUid = null;

        // 1. אתחול רשימת ערים בתוך ה-Datalist
        Object.keys(schoolData).sort().forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            citiesList.appendChild(option);
        });

        // 2. האזנה לשינוי בעיר כדי לעדכן בתי ספר
        cityInput.addEventListener('input', () => {
            const selectedCity = cityInput.value;
            schoolsList.innerHTML = ''; // ניקוי רשימה קודמת
            
            if (schoolData[selectedCity]) {
                schoolData[selectedCity].sort().forEach(school => {
                    const option = document.createElement('option');
                    option.value = school;
                    schoolsList.appendChild(option);
                });
                schoolInput.disabled = false;
                schoolInput.placeholder = "חפש בית ספר...";
            } else {
                schoolInput.disabled = true;
                schoolInput.value = '';
                schoolInput.placeholder = "בחר עיר קודם...";
            }
        });

        // 3. בחירת שכבה
        document.querySelectorAll('.grade-option').forEach(opt => {
            opt.onclick = () => {
                document.querySelectorAll('.grade-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            };
        });

        // 4. יצירת חשבון
        submitBtn.onclick = async () => {
            const grade = document.querySelector('.grade-option.active');
            const city = cityInput.value;
            const school = schoolInput.value;

            // בדיקת תקינות - לוודא שהערכים קיימים ברשימה (אופציונלי אך מומלץ)
            if(!city || !school || !grade) return alert("מלאו את כל הפרטים!");
            if(!schoolData[city]) return alert("יש לבחור עיר מהרשימה");

            submitBtn.disabled = true;
            submitBtn.textContent = "מייצר קוד...";

            try {
                const userRes = await signInAnonymously(auth);
                const user = userRes.user;
                currentUserUid = user.uid;

                const shortId = Math.floor(10000 + Math.random() * 90000).toString();

                await setDoc(doc(db, "users", user.uid), {
                    name: localStorage.getItem('temp_name') || "אנונימי",
                    city: city,
                    school: school,
                    grade: grade.textContent,
                    shortId: shortId,
                    diamonds: 10,
                    createdAt: serverTimestamp()
                });

                displayCode.textContent = shortId;
                regCard.style.display = 'none';
                document.getElementById('regHeader').style.display = 'none';
                successCard.style.display = 'block';

            } catch (e) {
                alert("שגיאה: " + e.message);
                submitBtn.disabled = false;
            }
        };

        // 5. שמירת אימייל
        document.getElementById('saveEmailBtn').onclick = async () => {
            const email = document.getElementById('recoveryEmail').value.trim();
            if(!email.includes('@')) return alert("אימייל לא תקין");
            
            try {
                await updateDoc(doc(db, "users", currentUserUid), { recoveryEmail: email });
                alert("האימייל נשמר בהצלחה!");
                window.location.href = 'polls.html';
            } catch(e) { alert("שגיאה בשמירה"); }
        };

        document.getElementById('finishBtn').onclick = () => {
            window.location.href = 'polls.html';
        };
    </script>
</body>
</html>
