<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | מצא את השכבה שלך</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #00b4d8;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .glow { position: fixed; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 255, 204, 0.1) 0%, transparent 70%); filter: blur(80px); z-index: -1; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        header { text-align: center; margin-top: 40px; margin-bottom: 30px; }
        .step-indicator { color: var(--primary); font-weight: 800; letter-spacing: 2px; font-size: 0.9rem; }
        h1 { font-size: 2.2rem; font-weight: 800; }
        .registration-card { background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); padding: 30px; border-radius: 35px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .input-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #cbd5e1; margin-right: 10px; }
        select { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 18px; border-radius: 20px; color: white; font-size: 1.1rem; outline: none; cursor: pointer; }
        select option { background-color: #050a14; color: white; }
        .grade-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 30px; }
        .grade-option { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: 700; }
        .grade-option.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
        .btn-next { width: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; border: none; padding: 20px; border-radius: 20px; font-size: 1.3rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }
        .back-link { margin-top: 20px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="glow"></div>

    <header>
        <span class="step-indicator">שלב 2 מתוך 3</span>
        <h1>איפה אתם לומדים?</h1>
    </header>

    <main class="registration-card">
        <div class="input-group">
            <label>בחירת עיר</label>
            <select id="citySelect">
                <option value="" disabled selected>בחר עיר...</option>
                </select>
        </div>

        <div class="input-group">
            <label>שם בית הספר</label>
            <select id="schoolSelect" disabled>
                <option value="" disabled selected>בחר עיר קודם...</option>
            </select>
        </div>

        <label>באיזו שכבה אתם?</label>
        <div class="grade-selector" id="gradeSelector">
            <div class="grade-option">ז'</div>
            <div class="grade-option">ח'</div>
            <div class="grade-option">ט'</div>
            <div class="grade-option">י'</div>
            <div class="grade-option">י"א</div>
            <div class="grade-option">י"ב</div>
        </div>

        <button class="btn-next" id="submitBtn">ממשיכים לפרגונים <span>←</span></button>
    </main>

    <a href="index.html" class="back-link">חזרה לדף הקודם</a>

    <script type="module">
        // ייבוא מ-Firebase - וודא שהקובץ קיים בתיקייה!
        import { db, auth, setDoc, doc, getDoc, signInAnonymously, serverTimestamp } from './firebase-config.js';

        const schoolData = {
            "ירושלים": ["גימנסיה רחביה", "תיכון ליד האוניברסיטה", "בויאר", "פלך", "אורט רמות", "ליפשיץ", "דרור"],
            "תל אביב-יפו": ["עירוני א'", "עירוני ד'", "אליאנס", "תיכון חדש", "גימנסיה הרצליה", "ליידי דייויס", "שבח מופת"],
            "חיפה": ["עירוני ה'", "רעות לאמנויות", "בסמ\"ת", "הריאלי", "ליאו באק", "חוגים"],
            "ראשון לציון": ["מקיף ח'", "מקיף י\"א", "מקיף ט'", "הגימנסיה הריאלית", "עמית עמל", "גן נחום"],
            "פתח תקווה": ["אחד העם", "ברנר", "גולדה מאיר", "עמל א'", "בן גוריון"],
            "אשדוד": ["מקיף ג'", "מקיף ד'", "מקיף ז'", "מקיף א'", "מקיף ח'"],
            "נתניה": ["שרת", "אורט יד ליבוביץ'", "ריגלר", "אלדד", "גוטמן"],
            "באר שבע": ["מקיף א'", "מקיף ג'", "רגר", "מקיף ו'", "טוביהו"],
            "חולון": ["קוגל", "קריית שרת", "אורט חולון", "אילון", "נבון"],
            "רמת גן": ["בליך", "אהל שם", "אורט אבין", "תיכון חדש ר\"ג"],
            "רחובות": ["דה שליט", "קציר", "אורט רחובות", "ויצו"],
            "הרצליה": ["תיכון הראשונים", "היובל", "תיכון חדש הרצליה", "אורט הרצליה"],
            "כפר סבא": ["גלילי", "כצנלסון", "רבין", "הראל"],
            "רעננה": ["אוסטרובסקי", "מור מטרווסט", "אביב"],
            "מודיעין": ["עירוני א'", "עירוני ב'", "עירוני ג'", "מור", "יחד"]
        };

        const citySelect = document.getElementById('citySelect');
        const schoolSelect = document.getElementById('schoolSelect');
        const submitBtn = document.getElementById('submitBtn');
        const gradeOptions = document.querySelectorAll('.grade-option');

        // 1. טעינת ערים
        Object.keys(schoolData).sort().forEach(city => {
            const opt = document.createElement('option');
            opt.value = city;
            opt.textContent = city;
            citySelect.appendChild(opt);
        });

        // 2. עדכון בתי ספר
        citySelect.addEventListener('change', () => {
            const schools = schoolData[citySelect.value] || [];
            schoolSelect.innerHTML = '<option value="" disabled selected>בחר בית ספר...</option>';
            schools.sort().forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                schoolSelect.appendChild(opt);
            });
            schoolSelect.disabled = false;
        });

        // 3. בחירת שכבה
        gradeOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                gradeOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            });
        });

        // 4. שליחה ל-Firebase
        submitBtn.addEventListener('click', async () => {
            const city = citySelect.value;
            const school = schoolSelect.value;
            const activeGrade = document.querySelector('.grade-option.active');

            if (!city || !school || !activeGrade) {
                alert("חובה לבחור עיר, בית ספר ושכבה!");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "שומר נתונים...";

            try {
                let user = auth.currentUser;
                if (!user) {
                    const res = await signInAnonymously(auth);
                    user = res.user;
                }

                await setDoc(doc(db, "users", user.uid), {
                    name: localStorage.getItem('temp_name') || "אנונימי",
                    city: city,
                    school: school,
                    grade: activeGrade.textContent,
                    diamonds: 10,
                    createdAt: serverTimestamp()
                });

                window.location.href = 'polls.html';
            } catch (err) {
                console.error(err);
                alert("שגיאה בחיבור לשרת: " + err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = "נסה שוב ←";
            }
        });
    </script>
</body>
</html>
