<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | סקרים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --bg-dark: #050a14; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 100px; }
        header { width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(0, 255, 204, 0.05), transparent); }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: #64748b; padding: 5px 12px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; font-weight: 700; }
        .diamond-count { background: rgba(255, 255, 255, 0.1); padding: 5px 15px; border-radius: 20px; font-weight: 800; color: var(--primary); }
        #schoolName { text-align: center; font-size: 0.9rem; opacity: 0.7; margin-top: 10px; }
        .poll-container { width: 90%; max-width: 500px; margin-top: 20px; text-align: center; }
        .question-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 30px 20px; border-radius: 30px; backdrop-filter: blur(20px); margin-bottom: 30px; min-height: 150px; display: flex; align-items: center; justify-content: center; }
        .question-text { font-size: 1.8rem; font-weight: 800; line-height: 1.2; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 25px 10px; border-radius: 20px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 5px; }
        .option-btn:active { transform: scale(0.95); background: var(--primary); color: black; }
        .option-meta { font-size: 0.8rem; opacity: 0.6; font-weight: 400; }
        .skip-btn { margin-top: 30px; background: transparent; border: none; color: #64748b; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .nav-bar { position: fixed; bottom: 20px; width: 90%; max-width: 400px; background: rgba(10, 20, 40, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 15px; border-radius: 30px; display: flex; justify-content: space-around; z-index: 100; left: 50%; transform: translateX(-50%); }
        .nav-item { color: #64748b; text-decoration: none; font-weight: 800; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <button class="logout-btn" onclick="handleLogout()">התנתק ✕</button>
            <div class="diamond-count">💎 <span id="userDiamonds">0</span></div>
        </div>
        <p id="schoolName">טוען נתונים...</p>
    </header>

    <div class="poll-container" id="mainContent">
        <div class="question-card">
            <div class="question-text" id="questionText">מתחבר...</div>
        </div>
        <div class="options-grid" id="optionsGrid"></div>
        <button class="skip-btn" onclick="handleSkip()">דלג על שאלה ➔</button>
    </div>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item active"><span>🎮</span>סקרים</a>
        <a href="inbox.html" class="nav-item"><span>🔥</span>להבות</a>
        <a href="squad.html" class="nav-item"><span>👥</span>נבחרת</a>
    </div>

<script type="module">
    import { db, auth, onAuthStateChanged, collection, query, where, getDocs, doc, getDoc, addDoc, serverTimestamp, updateDoc, increment, signOut, signInAnonymously } from './firebase-config.js';

    let userDocId = null; 
    let schoolMates = [];
    let currentQuestionIndex = 0;
    const questions = ["למי יש את הסטוריז הכי מצחיקים?", "מי יגיע הכי רחוק בחיים?", "עם מי הכי כיף להיתקע במעלית?", "למי יש את הסטייל הכי ייחודי?", "מי תמיד עוזר לכולם?", "למי יש את החיוך הכי יפה?"];

    window.handleLogout = async () => {
        if (confirm("בטוח שרוצה להתנתק?")) {
            localStorage.clear();
            await signOut(auth);
            window.location.href = 'index.html';
        }
    };

    window.handleSkip = () => {
        currentQuestionIndex++;
        renderPoll();
    };

    window.vote = async (toId, toName) => {
        if (!userDocId) return;
        try {
            await addDoc(collection(db, "votes"), {
                fromId: userDocId,
                toId: toId,
                toName: toName,
                question: questions[currentQuestionIndex % questions.length],
                timestamp: serverTimestamp()
            });
            await updateDoc(doc(db, "users", userDocId), { diamonds: increment(1) });
            const dElem = document.getElementById('userDiamonds');
            if(dElem) dElem.innerText = parseInt(dElem.innerText) + 1;
            currentQuestionIndex++;
            renderPoll();
        } catch (e) { console.error("Vote error:", e); }
    };

    function renderPoll() {
        const grid = document.getElementById('optionsGrid');
        const qText = document.getElementById('questionText');
        
        if (schoolMates.length === 0) {
            qText.innerText = "מחפש חברים מהשכבה...";
            grid.innerHTML = '';
            return;
        }

        qText.innerText = questions[currentQuestionIndex % questions.length];
        grid.innerHTML = '';

        const displayMates = [...schoolMates].sort(() => 0.5 - Math.random()).slice(0, 4);
        displayMates.forEach(mate => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span>${mate.name}</span><span class="option-meta">שכבה ${mate.grade}</span>`;
            btn.onclick = () => window.vote(mate.id, mate.name);
            grid.appendChild(btn);
        });
    }

    async function loadData() {
        const rawId = localStorage.getItem('user_short_id');
        const savedShortId = rawId ? rawId.trim() : null;

        console.log("--- תהליך טעינת נתונים ---");
        console.log("מחפש משתמש עם קוד:", savedShortId);

        if (!savedShortId) {
            console.error("אין קוד ב-Storage!");
            window.location.href = 'index.html';
            return;
        }

        try {
            const usersRef = collection(db, "users");
            const q = query(usersRef, where("shortId", "==", String(savedShortId)));
            const qSnap = await getDocs(q);

            if (!qSnap.empty) {
                const userDoc = qSnap.docs[0];
                const userData = userDoc.data();
                userDocId = userDoc.id;
                
                console.log("✅ נמצא משתמש ב-Firestore:", userData);

                document.getElementById('userDiamonds').innerText = userData.diamonds || 0;
                document.getElementById('schoolName').innerText = userData.school || "בית ספר לא מוגדר";

                // טעינת חברים מהבית ספר
                const matesQ = query(usersRef, where("school", "==", userData.school));
                const matesSnap = await getDocs(matesQ);
                schoolMates = [];
                matesSnap.forEach((docSnap) => {
                    if (docSnap.id !== userDocId) {
                        schoolMates.push({ id: docSnap.id, ...docSnap.data() });
                    }
                });
                renderPoll();
            } else {
                console.warn("❌ לא נמצא מסמך תואם לקוד:", savedShortId);
                document.getElementById('questionText').innerText = "לא מצאנו את הקוד שלך...";
                // שים לב: הורדתי את ה-Redirect כדי שתוכל לראות מה הבעיה ב-Console
            }
        } catch (err) {
            console.error("🔥 שגיאת Firestore:", err);
            // אם יש שגיאת Index, יופיע לינק ב-Console. תלחץ עליו.
        }
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            console.log("מבצע חיבור אנונימי...");
            await signInAnonymously(auth);
        } else {
            console.log("משתמש מחובר ל-Auth:", user.uid);
            loadData();
        }
    });
</script>
</body>
</html>
