<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | סקרים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #7000ff;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Assistant', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        header {
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0, 255, 204, 0.05), transparent);
        }

        .diamond-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 800;
            color: var(--primary);
            display: inline-block;
            margin-bottom: 10px;
        }

        .poll-container {
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            text-align: center;
        }

        .question-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 30px 20px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 25px 10px;
            border-radius: 20px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .option-btn:active {
            transform: scale(0.95);
            background: var(--primary);
            color: black;
        }

        .option-meta {
            font-size: 0.8rem;
            opacity: 0.6;
            font-weight: 400;
        }

        .skip-btn {
            margin-top: 30px;
            background: transparent;
            border: none;
            color: #64748b;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        /* תפריט תחתון */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            width: 90%;
            max-width: 400px;
            background: rgba(10, 20, 40, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
        }

        .nav-item {
            color: #64748b;
            text-decoration: none;
            font-weight: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active { color: var(--primary); }

        .empty-state {
            padding: 50px 20px;
            text-align: center;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <header>
        <div class="diamond-count">💎 <span id="userDiamonds">0</span></div>
        <p id="schoolName" style="font-size: 0.9rem; opacity: 0.7;"></p>
    </header>

    <div class="poll-container" id="mainContent">
        <div class="question-card">
            <div class="question-text" id="questionText">טוען שאלה...</div>
        </div>

        <div class="options-grid" id="optionsGrid">
            </div>

        <button class="skip-btn" onclick="renderNewPoll()">דלג על שאלה ➔</button>
    </div>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item active"><span>🎮</span>סקרים</a>
        <a href="inbox.html" class="nav-item"><span>🔥</span>להבות</a>
        <a href="index.html" class="nav-item"><span>👤</span>פרופיל</a>
    </div>

    <script type="module">
        import { db, auth, onAuthStateChanged, collection, query, where, getDocs, addDoc, serverTimestamp, doc, getDoc } from './firebase-config.js';

        let currentUser = null;
        let schoolMates = [];
        const questions = [
            "למי יש את הסטוריז הכי מצחיקים?",
            "מי יגיע הכי רחוק בחיים?",
            "עם מי הכי כיף להיתקע במעלית?",
            "למי יש את הסטייל הכי ייחודי?",
            "מי תמיד עוזר לכולם בלי לבקש תמורה?",
            "למי יש את החיוך הכי יפה?",
            "מי הבן אדם הכי אינטליגנט שאתה מכיר?",
            "מי תמיד מציל את המצב בקיזוזים?"
        ];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    document.getElementById('userDiamonds').innerText = data.diamonds || 0;
                    document.getElementById('schoolName').innerText = data.school;
                    loadSchoolMates(data.school, user.uid);
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadSchoolMates(school, myUid) {
            // שולף את כל מי שלומד באותו בית ספר (בלי סינון שכבה כרגע כדי שיהיו תוצאות)
            const q = query(collection(db, "users"), where("school", "==", school));
            const querySnapshot = await getDocs(q);
            
            schoolMates = [];
            querySnapshot.forEach((doc) => {
                if (doc.id !== myUid) {
                    schoolMates.push({ id: doc.id, ...doc.data() });
                }
            });

            if (schoolMates.length > 0) {
                renderNewPoll();
            } else {
                document.getElementById('mainContent').innerHTML = `
                    <div class="empty-state">
                        <h2>אופס, חסרים חברים!</h2>
                        <p>אתה כרגע היחיד מהביס שלך שנרשם. שלח לינק לחברים כדי להתחיל לשחק!</p>
                    </div>`;
            }
        }

        window.renderNewPoll = function() {
            // בחירת שאלה רנדומלית
            const randomQ = questions[Math.floor(Math.random() * questions.length)];
            document.getElementById('questionText').innerText = randomQ;

            // בחירת 4 משתתפים רנדומליים (או פחות אם אין מספיק)
            const shuffled = [...schoolMates].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 4);

            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';

            selected.forEach(mate => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `
                    ${mate.name}
                    <span class="option-meta">שכבה ${mate.grade}</span>
                `;
                btn.onclick = () => handleVote(mate.id, mate.name, randomQ);
                grid.appendChild(btn);
            });
        };

        async function handleVote(toId, toName, question) {
            try {
                // שמירת ההצבעה ב-Collection של votes
                await addDoc(collection(db, "votes"), {
                    fromId: currentUser.uid,
                    toId: toId,
                    toName: toName,
                    question: question,
                    timestamp: serverTimestamp()
                });

                // מעבר לשאלה הבאה עם אפקט קטן
                document.getElementById('mainContent').style.opacity = '0';
                setTimeout(() => {
                    renderNewPoll();
                    document.getElementById('mainContent').style.opacity = '1';
                }, 300);

            } catch (e) {
                console.error("Error voting:", e);
                alert("בעיה בשמירת ההצבעה");
            }
        }
    </script>
</body>
</html>
