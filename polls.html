<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | סקרים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --secondary: #00b4d8; --bg-dark: #050a14; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; padding-bottom: 120px; overflow-x: hidden; }
        
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 50px 50px; z-index: -2; opacity: 0.2; }
        .glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 255, 204, 0.1) 0%, transparent 70%); filter: blur(100px); z-index: -1; top: 40%; left: 50%; transform: translate(-50%, -50%); }

        /* Header המעודכן עם פרטי המשתמש */
        header { width: 100%; max-width: 500px; margin-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%; }
        
        .profile-header {
            display: flex; align-items: center; gap: 15px; width: 100%;
            padding: 20px; background: var(--glass); border-radius: 25px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .avatar {
            width: 55px; height: 55px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 800; color: #050a14; transform: rotate(-5deg);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .user-info h2 { font-size: 1.3rem; font-weight: 800; color: #fff; }
        .user-info p { color: var(--primary); font-size: 0.85rem; font-weight: 600; opacity: 0.8; }

        .top-stats { display: flex; gap: 10px; margin-top: 10px; width: 100%; }
        .diamond-count { background: rgba(0, 255, 204, 0.1); border: 1px solid rgba(0, 255, 204, 0.2); padding: 8px 18px; border-radius: 20px; font-weight: 800; color: var(--primary); flex: 1; text-align: center; }
        .logout-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #94a3b8; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 700; }

        /* Poll Styles */
        .poll-container { width: 100%; max-width: 500px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .question-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 35px 25px; border-radius: 35px; backdrop-filter: blur(20px); margin-bottom: 25px; min-height: 160px; display: flex; align-items: center; justify-content: center; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
        .question-card::after { content:''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 50%; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); }
        .question-text { font-size: 1.8rem; font-weight: 800; line-height: 1.2; color: #fff; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .option-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 22px 10px; border-radius: 22px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .option-btn:hover { border-color: var(--primary); background: rgba(0, 255, 204, 0.05); transform: translateY(-3px); }
        .option-meta { font-size: 0.8rem; color: #94a3b8; font-weight: 400; }
        
        /* תיקון כפתור דלג - עלה ב-10PX וקיבל ריווח תחתון */
        .skip-btn { margin-top: 25px; margin-bottom: 10px; background: none; border: none; color: #64748b; font-weight: 700; cursor: pointer; font-size: 1rem; padding: 10px 20px; transition: 0.3s; }
        .skip-btn:hover { color: white; }

        .nav-bar { position: fixed; bottom: 25px; width: 90%; max-width: 420px; background: rgba(10, 20, 40, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); padding: 18px; border-radius: 30px; display: flex; justify-content: space-around; z-index: 100; left: 50%; transform: translateX(-50%); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .nav-item { color: #94a3b8; text-decoration: none; font-weight: 700; display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; gap: 6px; font-style: normal; }
        .nav-item i { font-size: 1.4rem; font-style: normal; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }

        .whatsapp-invite-container { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 20px; }
        .whatsapp-invite-btn { background: linear-gradient(135deg, rgba(37, 211, 102, 0.2) 0%, rgba(37, 211, 102, 0.05) 100%); border: 1px solid rgba(37, 211, 102, 0.4); color: #fff; padding: 18px 30px; border-radius: 20px; text-decoration: none; font-weight: 800; display: flex; align-items: center; gap: 12px; }
        .whatsapp-icon { width: 24px; height: 24px; fill: #25D366; }

        @media (max-width: 480px) {
            .question-text { font-size: 1.5rem; }
            .option-btn { padding: 18px 8px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="glow"></div>

    <header>
        <div class="profile-header">
            <div class="avatar" id="userInitial">--</div>
            <div class="user-info">
                <h2 id="userName">טוען...</h2>
                <p id="userSchoolTag">מתחבר...</p>
            </div>
        </div>
        <div class="top-stats">
            <div class="diamond-count">💎 <span id="userDiamonds">0</span></div>
            <button class="logout-btn" onclick="handleLogout()">התנתק ✕</button>
        </div>
    </header>

    <div class="poll-container" id="mainContent">
        <div class="question-card">
            <div class="question-text" id="questionText">מתחילים...</div>
        </div>
        <div class="options-grid" id="optionsGrid"></div>
        <button class="skip-btn" id="skipBtn" onclick="handleSkip()">דלג על שאלה ➔</button>
    </div>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item active"><i>🎮</i><span>סקרים</span></a>
        <a href="inbox.html" class="nav-item"><i>🔥</i><span>להבות</span></a>
        <a href="squad.html" class="nav-item"><i>👥</i><span>נבחרת</span></a>
    </div>

<script type="module">
    import { db, auth, onAuthStateChanged, collection, query, where, getDocs, doc, getDoc, addDoc, serverTimestamp, updateDoc, increment, signOut, signInAnonymously } from './firebase-config.js';

    let userDocId = null; 
    let schoolMates = [];
    let currentQuestionIndex = 0;
    const questions = ["למי יש את הסטוריז הכי מצחיקים?", "מי יגיע הכי רחוק בחיים?", "עם מי הכי כיף להיתקע במעלית?", "למי יש את הסטייל הכי ייחודי?", "מי תמיד עוזר לכולם?", "למי יש את החיוך הכי יפה?"];

    window.handleLogout = async () => {
        if (confirm("בטוח שרוצה להתנתק?")) {
            localStorage.clear();
            await signOut(auth);
            window.location.href = 'index.html';
        }
    };

    window.handleSkip = () => {
        currentQuestionIndex++;
        renderPoll();
    };

    window.vote = async (toId, toName) => {
        if (!userDocId) return;
        try {
            await addDoc(collection(db, "votes"), {
                fromId: userDocId,
                toId: toId,
                toName: toName,
                question: questions[currentQuestionIndex % questions.length],
                timestamp: serverTimestamp()
            });
            await updateDoc(doc(db, "users", userDocId), { diamonds: increment(1) });
            const dElem = document.getElementById('userDiamonds');
            if(dElem) dElem.innerText = parseInt(dElem.innerText) + 1;
            currentQuestionIndex++;
            renderPoll();
        } catch (e) { console.error("Vote error:", e); }
    };

    function renderPoll() {
        const grid = document.getElementById('optionsGrid');
        const qText = document.getElementById('questionText');
        const skipBtn = document.getElementById('skipBtn');
        
        if (schoolMates.length === 0) {
            qText.innerText = "אתה הראשון מהבי"ס שלך כאן!";
            grid.innerHTML = `
                <div class="whatsapp-invite-container">
                    <p style="color: #94a3b8; text-align: center;">תזמין חברים כדי שתוכלו להצביע אחד לשני!</p>
                    <a href="https://wa.me/?text=${encodeURIComponent('חייבים להיכנס ל-10GAZ! בואו לראות מי מצביע לכם: https://ramirotem01.github.io/10GAZ/')}" class="whatsapp-invite-btn">
                        <svg class="whatsapp-icon" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.001 5.45-4.436 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 0 5.414 0 12.05c0 2.123.553 4.197 1.603 6.032L0 24l6.105-1.603a11.845 11.845 0 005.94 1.603h.005c6.632 0 12.049-5.417 12.049-12.05.001-3.218-1.252-6.244-3.522-8.513z"/></svg>
                        הזמן את השכבה
                    </a>
                </div>`;
            if(skipBtn) skipBtn.style.display = 'none';
            return;
        }

        grid.innerHTML = '';
        if(skipBtn) skipBtn.style.display = 'block';
        qText.innerText = questions[currentQuestionIndex % questions.length];
        
        const displayMates = [...schoolMates].sort(() => 0.5 - Math.random()).slice(0, 4);
        displayMates.forEach(mate => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span>${mate.name}</span><span class="option-meta">שכבה ${mate.grade}</span>`;
            btn.onclick = () => window.vote(mate.id, mate.name);
            grid.appendChild(btn);
        });
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) { await signInAnonymously(auth); return; }
        
        try {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) {
                const userData = userSnap.data();
                userDocId = user.uid;
                
                // עדכון ממשק משתמש
                document.getElementById('userName').innerText = userData.name;
                document.getElementById('userInitial').innerText = userData.name.substring(0, 2);
                document.getElementById('userSchoolTag').innerText = `${userData.school} • שכבה ${userData.grade}`;
                document.getElementById('userDiamonds').innerText = userData.diamonds || 0;

                // טעינת חברים מהבי"ס
                const matesSnap = await getDocs(query(collection(db, "users"), where("school", "==", userData.school)));
                schoolMates = [];
                matesSnap.forEach((docSnap) => {
                    if (docSnap.id !== userDocId) schoolMates.push({ id: docSnap.id, ...docSnap.data() });
                });
                renderPoll();
            } else {
                window.location.href = 'register.html';
            }
        } catch (err) { console.error(err); }
    });
</script>
</body>
</html>
