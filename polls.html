<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | סקרים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 100px; }

        header { width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(0, 255, 204, 0.05), transparent); }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        
        .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: #64748b; padding: 5px 12px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; font-weight: 700; }
        .diamond-count { background: rgba(255, 255, 255, 0.1); padding: 5px 15px; border-radius: 20px; font-weight: 800; color: var(--primary); }
        
        #schoolName { text-align: center; font-size: 0.9rem; opacity: 0.7; margin-top: 10px; }

        .poll-container { width: 90%; max-width: 500px; margin-top: 20px; text-align: center; transition: opacity 0.3s ease; }
        .question-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 30px 20px; border-radius: 30px; backdrop-filter: blur(20px); margin-bottom: 30px; min-height: 150px; display: flex; align-items: center; justify-content: center; }
        .question-text { font-size: 1.8rem; font-weight: 800; line-height: 1.2; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 25px 10px; border-radius: 20px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 5px; }
        .option-btn:active { transform: scale(0.95); background: var(--primary); color: black; }
        .option-meta { font-size: 0.8rem; opacity: 0.6; font-weight: 400; }

        .skip-btn { margin-top: 30px; background: transparent; border: none; color: #64748b; font-weight: 700; cursor: pointer; font-size: 1rem; }
        
        .nav-bar { position: fixed; bottom: 20px; width: 90%; max-width: 400px; background: rgba(10, 20, 40, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 15px; border-radius: 30px; display: flex; justify-content: space-around; z-index: 100; left: 50%; transform: translateX(-50%); }
        .nav-item { color: #64748b; text-decoration: none; font-weight: 800; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <button class="logout-btn" id="logoutBtn">התנתק ✕</button>
            <div class="diamond-count">💎 <span id="userDiamonds">0</span></div>
        </div>
        <p id="schoolName">טוען נתונים...</p>
    </header>

    <div class="poll-container" id="mainContent">
        <div class="question-card">
            <div class="question-text" id="questionText">מחפש חברים מהבי"ס...</div>
        </div>
        <div class="options-grid" id="optionsGrid"></div>
        <button class="skip-btn" id="skipBtn">דלג על שאלה ➔</button>
    </div>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item active"><span>🎮</span>סקרים</a>
        <a href="inbox.html" class="nav-item"><span>🔥</span>להבות</a>
        <a href="squad.html" class="nav-item"><span>👥</span>נבחרת</a>
    </div>

<script type="module">
    import { db, auth, onAuthStateChanged, collection, query, where, getDocs, doc, getDoc, addDoc, serverTimestamp, updateDoc, increment, signOut } from './firebase-config.js';

    let currentUser = null;
    let schoolMates = [];
    let currentQuestionIndex = 0;

    const baseQuestions = [
        "למי יש את הסטוריז הכי מצחיקים?",
        "מי יגיע הכי רחוק בחיים?",
        "עם מי הכי כיף להיתקע במעלית?",
        "למי יש את הסטייל הכי ייחודי?",
        "מי תמיד עוזר לכולם?",
        "למי יש את החיוך הכי יפה?",
        "מי הבן אדם הכי חכם בשכבה?",
        "מי הכי מרים במסיבות?"
    ];
    let shuffledQuestions = [];

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        currentUser = user;
        shuffledQuestions = [...baseQuestions].sort(() => 0.5 - Math.random());

        try {
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) {
                const userData = userSnap.data();
                document.getElementById('userDiamonds').innerText = userData.diamonds || 0;
                document.getElementById('schoolName').innerText = userData.school;
                
                // שליפת חברים בדיוק כמו ב-Squad
                loadMates(userData.school, user.uid);
            }
        } catch (e) {
            console.error("Auth error:", e);
        }
    });

    async function loadMates(school, myUid) {
        try {
            const q = query(collection(db, "users"), where("school", "==", school));
            const querySnapshot = await getDocs(q);
            schoolMates = [];
            
            querySnapshot.forEach((docSnap) => {
                if (docSnap.id !== myUid) {
                    schoolMates.push({ id: docSnap.id, ...docSnap.data() });
                }
            });

            if (schoolMates.length >= 1) {
                renderPoll();
            } else {
                document.getElementById('questionText').innerText = "אתה הראשון מהבי\"ס! תזמין חברים כדי להתחיל לשחק.";
            }
        } catch (e) {
            console.error("Load mates error:", e);
        }
    }

    function renderPoll() {
        if (currentQuestionIndex >= shuffledQuestions.length) {
            document.getElementById('mainContent').innerHTML = `<div class="question-card"><h2>סיימת את הסבב! 🔥</h2><button onclick="location.reload()" class="skip-btn">סיבוב נוסף ↻</button></div>`;
            return;
        }

        const currentQ = shuffledQuestions[currentQuestionIndex];
        document.getElementById('questionText').innerText = currentQ;

        // בחירת 4 חברים אקראיים
        const displayMates = [...schoolMates].sort(() => 0.5 - Math.random()).slice(0, 4);
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';

        displayMates.forEach(mate => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span>${mate.name}</span><span class="option-meta">שכבה ${mate.grade}</span>`;
            btn.onclick = () => handleVote(mate.id, mate.name, currentQ);
            grid.appendChild(btn);
        });
    }

    async function handleVote(toId, toName, question) {
        try {
            await addDoc(collection(db, "votes"), {
                fromId: currentUser.uid,
                toId: toId,
                toName: toName,
                question: question,
                timestamp: serverTimestamp()
            });

            await updateDoc(doc(db, "users", currentUser.uid), { diamonds: increment(1) });
            
            const d = document.getElementById('userDiamonds');
            d.innerText = parseInt(d.innerText) + 1;

            currentQuestionIndex++;
            renderPoll();
        } catch (e) {
            console.error("Vote error:", e);
        }
    }

    // חיבור כפתורים פיזיים
    document.getElementById('skipBtn').onclick = () => {
        currentQuestionIndex++;
        renderPoll();
    };

    document.getElementById('logoutBtn').onclick = async () => {
        if (confirm("בטוח שרוצה להתנתק?")) {
            await signOut(auth);
            window.location.href = 'index.html';
        }
    };
</script>
</body>
</html>
