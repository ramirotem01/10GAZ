<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | סבב פרגונים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #00b4d8;
            --accent: #ff00ff;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Assistant', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* פס התקדמות */
        .progress-container {
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .progress-bar-bg {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%; 
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.4s ease;
        }

        .question-counter {
            font-weight: 800;
            font-size: 1rem;
            color: var(--primary);
        }

        /* אזור השאלה */
        .question-section {
            text-align: center;
            padding: 40px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-card {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        .question-card span { color: var(--primary); }

        /* גריד השמות */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            padding: 0 20px 40px 20px;
        }

        .option-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 25px 15px;
            border-radius: 24px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            min-height: 80px;
        }

        .option-btn:active {
            transform: scale(0.95);
            background: var(--primary);
            color: #000;
        }

        .action-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--glass-border);
        }

        .action-btn {
            background: none;
            border: none;
            color: #64748b;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        /* אנימציה למעבר שאלה */
        .slide-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        #loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-dark); display:flex; align-items:center;
            justify-content:center; z-index:100; font-size:1.5rem;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">טוען חברים מהשכבה...</div>

    <div class="progress-container">
        <div class="question-counter" id="qCounter">1/12</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <button class="action-btn" style="color: var(--accent);" onclick="window.location.href='index.html'">X</button>
    </div>

    <main class="question-section">
        <div class="question-card" id="questionText">
            טוען שאלה...
        </div>
    </main>

    <div class="options-grid" id="optionsGrid">
        </div>

    <footer class="action-bar">
        <button class="action-btn" onclick="renderOptions()">🔄 ערבב שמות</button>
        <button class="action-btn" onclick="nextQuestion()">דלג ➔</button>
    </footer>

    <script type="module">
        import { db, auth, onAuthStateChanged, getDoc, doc, collection, query, where, getDocs, addDoc, serverTimestamp } from './firebase-config.js';

        let currentUser = null;
        let classmates = [];
        let currentStep = 1;
        const totalSteps = 12;

        const questions = [
            "למי יש את הסטוריז <span>הכי מצחיקים</span>?",
            "מי יגיע <span>הכי רחוק</span> בחיים?",
            "מי הבן אדם <span>הכי נחמד</span> שפגשת?",
            "למי יש את הסטייל <span>הכי ייחודי</span>?",
            "מי תמיד <span>מציל את המצב</span>?",
            "מי הכי <span>חרוץ</span> בשכבה?",
            "מי <span>החבר/ה הכי טוב/ה</span> שאפשר לבקש?",
            "למי יש את <span>החיוך הכי יפה</span>?",
            "מי תמיד נראה <span>בשיא שלו</span>?",
            "עם מי הכי <span>כיף לצאת</span> להפסקה?",
            "למי יש את <span>הלב הכי רחב</span>?",
            "מי יהיה <span>הראשון שיתפרסם</span>?"
        ];

        // בדיקת חיבור וטעינת נתונים
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists()) {
                    currentUser = { id: user.id, ...userSnap.data() };
                    await loadClassmates();
                    initPoll();
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadClassmates() {
            const q = query(collection(db, "users"), 
                where("school", "==", currentUser.school),
                where("grade", "==", currentUser.grade)
            );
            const querySnapshot = await getDocs(q);
            querySnapshot.forEach((doc) => {
                if (doc.id !== auth.currentUser.uid) {
                    classmates.push({ id: doc.id, ...doc.data() });
                }
            });
            
            // אם אין מספיק אנשים, נוסיף שמות פיקטיביים רק להמחשה
            if (classmates.length < 4) {
                classmates.push({name: "עדיין אין מספיק", id: "dummy"});
            }
            
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function initPoll() {
            renderQuestion();
            renderOptions();
        }

        function renderQuestion() {
            const qText = questions[Math.floor(Math.random() * questions.length)];
            const el = document.getElementById('questionText');
            el.innerHTML = qText;
            el.classList.remove('slide-in');
            void el.offsetWidth; // Force reflow
            el.classList.add('slide-in');
            
            document.getElementById('qCounter').innerText = `${currentStep}/${totalSteps}`;
            document.getElementById('progressBar').style.width = `${(currentStep / totalSteps) * 100}%`;
        }

        window.renderOptions = function() {
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            
            // ערבוב ובחירת 4 חברים
            const shuffled = [...classmates].sort(() => 0.5 - Math.random()).slice(0, 4);
            
            shuffled.forEach(friend => {
                const btn = document.createElement('button');
                btn.className = 'option-btn slide-in';
                btn.innerText = friend.name;
                btn.onclick = () => handleVote(friend);
                grid.appendChild(btn);
            });
        }

        async function handleVote(votedFor) {
            if (votedFor.id === "dummy") return nextQuestion();

            try {
                // שמירת הפרגון ב-DB
                await addDoc(collection(db, "votes"), {
                    fromId: auth.currentUser.uid,
                    toId: votedFor.id,
                    question: document.getElementById('questionText').innerText,
                    school: currentUser.school,
                    grade: currentUser.grade,
                    timestamp: serverTimestamp(),
                    isRead: false
                });
                nextQuestion();
            } catch (e) {
                console.error("Error voting:", e);
                nextQuestion(); // ממשיכים בכל מקרה
            }
        }

        window.nextQuestion = function() {
            if (currentStep < totalSteps) {
                currentStep++;
                renderQuestion();
                renderOptions();
            } else {
                // סיום הסבב - מעבר לדף הלהבות
                window.location.href = 'inbox.html';
            }
        }
    </script>
</body>
</html>
