<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | סקרים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --secondary: #00b4d8; --bg-dark: #050a14; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; padding: 20px; padding-bottom: 120px; overflow-x: hidden; }
        
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 50px 50px; z-index: -2; opacity: 0.2; }
        .glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 255, 204, 0.1) 0%, transparent 70%); filter: blur(100px); z-index: -1; top: 40%; left: 50%; transform: translate(-50%, -50%); }

        header { width: 100%; max-width: 500px; margin: 0 auto 20px; }
        .profile-header {
            display: flex; align-items: center; gap: 15px; width: 100%;
            padding: 20px; background: var(--glass); border-radius: 25px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .avatar {
            width: 55px; height: 55px; background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 800; color: #050a14; transform: rotate(-5deg);
        }

        .user-info h2 { font-size: 1.3rem; font-weight: 800; color: #fff; }
        .user-info p { color: var(--primary); font-size: 0.85rem; font-weight: 600; opacity: 0.8; }

        .top-stats { display: flex; gap: 10px; margin-top: 15px; justify-content: center; width: 100%; }
        
        .diamond-count { 
            background: rgba(0, 255, 204, 0.1); border: 1px solid rgba(0, 255, 204, 0.2); 
            padding: 6px 15px; border-radius: 20px; font-weight: 800; color: var(--primary); 
            font-size: 0.9rem; display: flex; align-items: center; gap: 5px;
        }

        .logout-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            color: #94a3b8; padding: 6px 15px; border-radius: 20px; cursor: pointer; 
            font-size: 0.85rem; font-weight: 700; transition: 0.3s;
        }
        .logout-btn:hover { 
            background: rgba(255, 0, 0, 0.1); border-color: rgba(255, 0, 0, 0.4); color: #ff4d4d; 
        }

        .poll-container { width: 100%; max-width: 500px; margin: 0 auto; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .question-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 35px 25px; border-radius: 35px; backdrop-filter: blur(20px); margin-bottom: 25px; min-height: 160px; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .question-text { font-size: 1.8rem; font-weight: 800; line-height: 1.2; color: #fff; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .option-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 22px 10px; border-radius: 22px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .option-btn:hover { border-color: var(--primary); background: rgba(0, 255, 204, 0.05); transform: translateY(-3px); }
        .option-meta { font-size: 0.8rem; color: #94a3b8; font-weight: 400; }
        
        .skip-btn { margin-top: 15px; margin-bottom: 20px; background: none; border: none; color: #64748b; font-weight: 700; cursor: pointer; font-size: 1rem; padding: 10px 20px; }

        .nav-bar { position: fixed; bottom: 25px; width: 90%; max-width: 420px; background: rgba(10, 20, 40, 0.6); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); padding: 18px; border-radius: 30px; display: flex; justify-content: space-around; z-index: 100; left: 50%; transform: translateX(-50%); }
        .nav-item { color: #94a3b8; text-decoration: none; font-weight: 700; display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; gap: 6px; font-style: normal; }
        .nav-item i { font-size: 1.4rem; font-style: normal; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }

        .invite-section { grid-column: 1 / -1; background: var(--glass); border: 1px solid var(--glass-border); padding: 30px; border-radius: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        .btn-invite-whatsapp {
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.2) 0%, rgba(37, 211, 102, 0.05) 100%);
            border: 1px solid rgba(37, 211, 102, 0.4);
            color: #fff; padding: 18px 30px; border-radius: 20px; text-decoration: none;
            font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            gap: 12px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); width: fit-content; margin-top: 15px;
        }
        .btn-invite-whatsapp:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.3) 0%, rgba(37, 211, 102, 0.1) 100%);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.2);
        }
        .whatsapp-icon { width: 24px; height: 24px; fill: #25D366; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="glow"></div>

    <header id="userHeader" style="display: none;">
        <div class="profile-header">
            <div class="avatar" id="userInitial">--</div>
            <div class="user-info">
                <h2 id="userName">טוען...</h2>
                <p id="userSchoolTag">...</p>
            </div>
        </div>
        <div class="top-stats">
            <div class="diamond-count">💎 <span id="userDiamonds">0</span></div>
            <button class="logout-btn" onclick="handleLogout()">התנתק ✕</button>
        </div>
    </header>

    <div class="poll-container">
        <div class="question-card">
            <div class="question-text" id="questionText">טוען נתונים...</div>
        </div>
        <div class="options-grid" id="optionsGrid"></div>
        <button class="skip-btn" id="skipBtn" style="display: none;" onclick="handleSkip()">דלג על שאלה ➔</button>
    </div>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item active"><i>🎮</i><span>סקרים</span></a>
        <a href="inbox.html" class="nav-item"><i>🔥</i><span>להבות</span></a>
        <a href="squad.html" class="nav-item"><i>👥</i><span>נבחרת</span></a>
    </div>

<script type="module">
    import { db, auth, onAuthStateChanged, collection, query, where, getDocs, doc, getDoc, addDoc, serverTimestamp, updateDoc, increment, signOut } from './firebase-config.js';

    let currentUserData = null;
    let schoolMates = [];
    let currentQuestionIndex = 0;
    const MAX_QUESTIONS_PER_ROUND = 10; 

    const questions = [
        "למי יש את הסטוריז הכי מצחיקים?", "עם מי הכי כיף להיתקע במעלית?", "מי תמיד מעלה את המורל בכיתה?",
        "מי הבנאדם הכי 'וייב' בשכבה?", "מי תמיד יודע את כל הרכילות לפני כולם?", "מי הכי סביר שיהיה לו מיליון עוקבים בטיקטוק?",
        "מי תמיד מתחיל את המסיבה?", "מי יגיע הכי רחוק בחיים?", "מי תמיד עוזר לכולם בלי לבקש תמורה?",
        "למי יש את הלב הכי רחב בשכבה?", "מי הכי אינטליגנט בצורה שקטה?", "מי החבר/ה הכי נאמן/נה שאפשר לבקש?",
        "למי תמיד אפשר לפנות כשצריכים עצה טובה?", "מי הכי צנוע למרות שהוא תותח?", "למי יש את הסטייל הכי ייחודי?",
        "למי יש את החיוך הכי יפה?", "מי תמיד נראה כאילו הוא יצא עכשיו מצילומים?", "למי יש את העיניים הכי מהפנטות?",
        "מי הכי 'פרש' בשכבה?", "למי יש את השיער הכי מושלם?", "מי יהיה המנכ\"ל הבא של גוגל?",
        "מי יזכה בפרס נובל בעתיד?", "מי יופיע על שער מגזין אופנה?", "מי הכי סביר שייכנס ל'האח הגדול' וינצח?"
    ];

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        
        try {
            let userSnap = await getDoc(doc(db, "users", user.uid));
            const savedShortId = localStorage.getItem('user_short_id');
            
            if (!userSnap.exists() && savedShortId) {
                const q = query(collection(db, "users"), where("shortId", "==", savedShortId));
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) {
                    const foundDoc = querySnapshot.docs[0];
                    currentUserData = { ...foundDoc.data(), id: foundDoc.id };
                }
            } else if (userSnap.exists()) {
                currentUserData = { ...userSnap.data(), id: user.uid };
            }

            if (currentUserData) {
                document.getElementById('userHeader').style.display = 'block';
                document.getElementById('userName').innerText = currentUserData.name;
                document.getElementById('userInitial').innerText = currentUserData.name.substring(0, 2);
                document.getElementById('userSchoolTag').innerText = `${currentUserData.school} • שכבה ${currentUserData.grade}`;
                document.getElementById('userDiamonds').innerText = currentUserData.diamonds || 0;

                const matesSnap = await getDocs(query(collection(db, "users"), where("school", "==", currentUserData.school)));
                schoolMates = [];
                matesSnap.forEach(snap => {
                    if (snap.id !== currentUserData.id) {
                        schoolMates.push({ id: snap.id, ...snap.data() });
                    }
                });
                
                renderPoll();
            } else {
                window.location.href = 'register.html';
            }
        } catch (e) { 
            console.error("Auth error:", e);
        }
    });

    function renderPoll() {
        const grid = document.getElementById('optionsGrid');
        const qText = document.getElementById('questionText');
        const skipBtn = document.getElementById('skipBtn');
        
        if (currentQuestionIndex >= MAX_QUESTIONS_PER_ROUND) {
            qText.innerText = "הסבב הושלם! 🔥";
            grid.innerHTML = `
                <div class="invite-section">
                    <p style="color: #94a3b8; margin-bottom: 15px;">ענית על 10 שאלות. חזור בקרוב לשאלות חדשות!</p>
                    <button class="option-btn" style="width: 100%;" onclick="location.reload()">סבב חדש</button>
                </div>`;
            skipBtn.style.display = 'none';
            return;
        }

        if (schoolMates.length < 1) {
            qText.innerText = "אתה הראשון מהבי\"ס!";
            grid.innerHTML = `
                <div class="invite-section">
                    <p style="color: #94a3b8;">כדי להתחיל בסקרים, צריך לפחות עוד חבר אחד מהבי"ס שלך.</p>
                    <button class="btn-invite-whatsapp" onclick="shareApp()">
                        <svg class="whatsapp-icon" viewBox="0 0 24 24">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.001 5.45-4.436 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 0 5.414 0 12.05c0 2.123.553 4.197 1.603 6.032L0 24l6.105-1.603a11.845 11.845 0 005.94 1.603h.005c6.632 0 12.049-5.417 12.049-12.05.001-3.218-1.252-6.244-3.522-8.513z"/>
                        </svg>
                        הזמן חברים בוואטסאפ
                    </button>
                </div>`;
            skipBtn.style.display = 'none';
            return;
        }

        skipBtn.style.display = 'block';
        qText.innerText = questions[currentQuestionIndex % questions.length];
        grid.innerHTML = '';
        
        const shuffledMates = shuffle([...schoolMates]).slice(0, 4);
        shuffledMates.forEach(mate => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span>${mate.name}</span><span class="option-meta">שכבה ${mate.grade}</span>`;
            btn.onclick = () => handleVote(mate.id, mate.name);
            grid.appendChild(btn);
        });
    }

    async function handleVote(toId, toName) {
        try {
            await addDoc(collection(db, "votes"), {
                fromId: currentUserData.id,
                toId: toId,
                toName: toName,
                question: questions[currentQuestionIndex % questions.length],
                timestamp: serverTimestamp()
            });
            
            await updateDoc(doc(db, "users", currentUserData.id), { diamonds: increment(1) });
            const currentDiamonds = parseInt(document.getElementById('userDiamonds').innerText);
            document.getElementById('userDiamonds').innerText = currentDiamonds + 1;
            
            currentQuestionIndex++;
            renderPoll();
        } catch (e) { console.error("Vote error:", e); }
    }

    window.handleSkip = () => {
        currentQuestionIndex++;
        renderPoll();
    };

    window.handleLogout = async () => {
        if (confirm("בטוח שרוצה להתנתק?")) {
            await signOut(auth);
            localStorage.clear();
            window.location.href = 'index.html';
        }
    };

    window.shareApp = () => {
        const text = "בואו תראו מה אומרים עליכם ב-10GAZ! כנסו לראות מי הצביע לכם: https://ramirotem01.github.io/10GAZ/";
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    };
</script>
</body>
</html>
