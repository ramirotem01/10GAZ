<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | סקרים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --bg-dark: #050a14; --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background-color: var(--bg-dark); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 100px; }
        header { width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(0, 255, 204, 0.05), transparent); }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: #ff444422; border: 1px solid #ff444444; color: #ff6666; padding: 5px 12px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; }
        .diamond-count { background: rgba(255, 255, 255, 0.1); padding: 5px 15px; border-radius: 20px; font-weight: 800; color: var(--primary); }
        #schoolName { text-align: center; font-size: 0.9rem; opacity: 0.7; margin-top: 10px; }
        .poll-container { width: 90%; max-width: 500px; margin-top: 20px; text-align: center; }
        .question-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 30px 20px; border-radius: 30px; backdrop-filter: blur(20px); margin-bottom: 30px; min-height: 150px; display: flex; align-items: center; justify-content: center; }
        .question-text { font-size: 1.6rem; font-weight: 800; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 20px 10px; border-radius: 20px; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 5px; }
        .option-btn:hover { background: rgba(255,255,255,0.1); }
        .option-meta { font-size: 0.8rem; opacity: 0.6; }
        .skip-btn { margin-top: 30px; background: transparent; border: none; color: #64748b; font-weight: 700; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 20px; width: 90%; max-width: 400px; background: rgba(10, 20, 40, 0.9); border: 1px solid var(--glass-border); padding: 15px; border-radius: 30px; display: flex; justify-content: space-around; }
        .nav-item { color: #64748b; text-decoration: none; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <button id="logoutBtn" class="logout-btn">התנתק ✕</button>
            <div class="diamond-count">💎 <span id="userDiamonds">0</span></div>
        </div>
        <p id="schoolName">טוען...</p>
    </header>

    <div class="poll-container" id="mainContent">
        <div class="question-card">
            <div class="question-text" id="questionText">מתחבר למערכת...</div>
        </div>
        <div class="options-grid" id="optionsGrid"></div>
        <button id="skipBtn" class="skip-btn">דלג על שאלה ➔</button>
    </div>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item active"><span>🎮</span>סקרים</a>
        <a href="inbox.html" class="nav-item"><span>🔥</span>להבות</a>
        <a href="squad.html" class="nav-item"><span>👤</span>פרופיל</a>
    </div>

<script type="module">
    // ייבוא מ-Firebase
    import { db, auth, onAuthStateChanged, collection, getDocs, addDoc, serverTimestamp, doc, getDoc, updateDoc, increment, signOut } from './firebase-config.js';

    let currentUser = null;
    let schoolMates = [];
    let currentQuestionIndex = 0;
    const questions = [
        "למי יש את הסטוריז הכי מצחיקים?",
        "מי יגיע הכי רחוק בחיים?",
        "עם מי הכי כיף להיתקע במעלית?",
        "מי תמיד עוזר לכולם?",
        "למי יש את החיוך הכי יפה?",
        "מי הכי מרים במסיבות?"
    ];

    // פונקציית התנתקות - מחוברת ישירות לאלמנט
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        if (confirm("בטוח שרוצה להתנתק?")) {
            await signOut(auth);
            window.location.href = 'index.html';
        }
    });

    // פונקציית דילוג
    document.getElementById('skipBtn').addEventListener('click', () => {
        currentQuestionIndex++;
        renderPoll();
    });

    // הצגת הסקר
    function renderPoll() {
        if (currentQuestionIndex >= questions.length) {
            document.getElementById('mainContent').innerHTML = `<div class="question-card"><h2>סיימת הכל! 🔥</h2></div>`;
            return;
        }

        document.getElementById('questionText').innerText = questions[currentQuestionIndex];
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';

        // לוקחים 4 חברים אקראיים
        const displayMates = [...schoolMates].sort(() => 0.5 - Math.random()).slice(0, 4);

        displayMates.forEach(mate => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<b>${mate.name}</b><span class="option-meta">שכבה ${mate.grade}</span>`;
            btn.onclick = () => handleVote(mate.id, mate.name);
            grid.appendChild(btn);
        });
    }

    // הצבעה
    async function handleVote(toId, toName) {
        try {
            await addDoc(collection(db, "votes"), {
                fromId: currentUser.uid,
                toId: toId,
                toName: toName,
                question: questions[currentQuestionIndex],
                timestamp: serverTimestamp()
            });

            await updateDoc(doc(db, "users", currentUser.uid), { diamonds: increment(1) });
            
            // עדכון UI מהיר
            const d = document.getElementById('userDiamonds');
            d.innerText = parseInt(d.innerText) + 1;

            currentQuestionIndex++;
            renderPoll();
        } catch (e) { alert("שגיאה בשמירה"); }
    }

    // טעינת חברים
    async function fetchMates(school, myUid) {
        const snap = await getDocs(collection(db, "users"));
        schoolMates = [];
        snap.forEach(d => {
            const data = d.data();
            if (d.id !== myUid && data.school === school) {
                schoolMates.push({ id: d.id, ...data });
            }
        });

        if (schoolMates.length < 1) {
            document.getElementById('questionText').innerText = "אין מספיק חברים רשומים מבית הספר שלך עדיין.";
        } else {
            renderPoll();
        }
    }

    // בדיקת חיבור (לב המערכת)
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        
        currentUser = user;
        const userDoc = await getDoc(doc(db, "users", user.uid));
        
        if (userDoc.exists()) {
            const userData = userDoc.data();
            document.getElementById('userDiamonds').innerText = userData.diamonds || 0;
            document.getElementById('schoolName').innerText = "בית ספר: " + userData.school;
            fetchMates(userData.school, user.uid);
        } else {
            window.location.href = 'register.html';
        }
    });
</script>
</body>
</html>
