<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10GAZ | הלהבות שלי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff00ff;
            --secondary: #7000ff;
            --bg-dark: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Assistant', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        header {
            padding: 40px 20px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(112, 0, 255, 0.1), transparent);
        }

        .title-glow {
            font-size: 2.5rem;
            font-weight: 900;
            text-shadow: 0 0 20px var(--primary);
            margin-bottom: 5px;
        }

        .stats-summary {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .inbox-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .flame-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(15px);
            transition: 0.3s;
            position: relative;
            cursor: pointer;
            animation: fadeIn 0.5s ease;
        }

        .gender-indicator {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .flame-content { flex: 1; }
        .flame-question { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
        .flame-meta { font-size: 0.85rem; color: #64748b; }

        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(10, 20, 40, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-item {
            color: #64748b;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .nav-item.active { color: var(--primary); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-weight: 600;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="title-glow">הלהבות שלי 🔥</div>
        <div class="stats-summary" id="statsSummary">טוען פרגונים...</div>
    </header>

    <div class="inbox-container" id="inboxList">
        </div>

    <div class="nav-bar">
        <a href="polls.html" class="nav-item">
            <span>🎮</span>
            סקרים
        </a>
        <a href="inbox.html" class="nav-item active">
            <span>🔥</span>
            להבות
        </a>
        <a href="index.html" class="nav-item">
            <span>👤</span>
            פרופיל
        </a>
    </div>

    <script type="module">
        import { db, auth, onAuthStateChanged, collection, query, where, getDocs, orderBy } from './firebase-config.js';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loadInboxes(user.uid);
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadInboxes(uid) {
            const inboxList = document.getElementById('inboxList');
            const statsSummary = document.getElementById('statsSummary');
            
            try {
                const q = query(
                    collection(db, "votes"), 
                    where("toId", "==", uid),
                    orderBy("timestamp", "desc")
                );

                const querySnapshot = await getDocs(q);
                inboxList.innerHTML = '';

                if (querySnapshot.empty) {
                    inboxList.innerHTML = '<div class="empty-state">עדיין אין להבות... <br> תתחילו לפרגן לאחרים כדי שיפרגנו לכם!</div>';
                    statsSummary.innerText = '0 פרגונים חדשים';
                    return;
                }

                statsSummary.innerText = `קיבלת ${querySnapshot.size} פרגונים!`;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const timeAgo = data.timestamp ? formatTime(data.timestamp.toDate()) : 'עכשיו';
                    
                    const card = document.createElement('div');
                    card.className = 'flame-card';
                    card.innerHTML = `
                        <div class="gender-indicator">🔥</div>
                        <div class="flame-content">
                            <div class="flame-question">"${data.question}"</div>
                            <div class="flame-meta">${timeAgo} • מישהו מהשכבה</div>
                        </div>
                    `;
                    inboxList.appendChild(card);
                });

            } catch (e) {
                console.error("Error loading inbox:", e);
                inboxList.innerHTML = '<div class="empty-state">שגיאה בטעינת הנתונים.</div>';
            }
        }

        function formatTime(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'לפני רגע';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `לפני ${minutes} דקות`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `לפני ${hours} שעות`;
            return 'לפני מספר ימים';
        }
    </script>
</body>
</html>
